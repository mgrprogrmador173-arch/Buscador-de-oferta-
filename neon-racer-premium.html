<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>Neon Racer Premium</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;font-family:Arial,Helvetica,sans-serif;color:white}#app{position:fixed;inset:0;background:#020617}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.hud{position:absolute;inset:0;z-index:5;pointer-events:none}.panel{position:absolute;background:rgba(2,6,23,.82);border:2px solid #263a66;border-radius:10px;box-shadow:0 0 0 2px rgba(56,189,248,.18),0 0 20px rgba(56,189,248,.22);padding:10px;text-shadow:0 0 8px rgba(148,163,184,.55)}.label{font-weight:900;color:#38bdf8;letter-spacing:1px;font-size:13px}.pos{top:16px;left:14px;width:210px}.pos .num{font-size:80px;line-height:76px;font-weight:900;color:#facc15}.pos .sub{font-size:27px;font-weight:900}.lapline{border-top:2px solid rgba(148,163,184,.5);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between}.timer{top:16px;left:50%;transform:translateX(-50%);width:300px;text-align:center}.timer .value{font-size:43px;font-weight:900;letter-spacing:3px}.best{margin:auto;margin-top:6px;width:150px;border-top:1px solid #263a66;padding-top:4px;color:#cbd5e1;font-weight:800}.speed{top:16px;right:14px;width:330px;height:200px;text-align:right;clip-path:polygon(0 0,100% 0,100% 100%,25% 100%,0 65%)}.speed .value{font-size:86px;line-height:88px;font-weight:900}.gear{font-weight:900;color:#38bdf8;font-size:23px}.gear span{color:#facc15;font-size:46px}.bars{right:14px;top:235px;width:280px;display:grid;gap:12px}.barTitle{font-size:22px;font-weight:900;font-style:italic}.bar{height:28px;background:#030712;border:2px solid #1e293b;padding:4px;display:flex;gap:5px}.seg{flex:1;background:#1e293b}.seg.n{background:#22d3ee;box-shadow:0 0 8px #22d3ee}.seg.d{background:#ef4444;box-shadow:0 0 8px #ef4444}.map{left:14px;top:220px;width:185px;height:185px}.map:before{content:"";position:absolute;inset:24px;border:7px solid #e5e7eb;border-radius:45% 56% 48% 58%;filter:drop-shadow(0 0 5px #fff)}.dot{position:absolute;width:14px;height:14px;border-radius:50%;box-shadow:0 0 10px currentColor}.r{background:#ef4444;color:#ef4444;left:112px;top:29px}.b{background:#38bdf8;color:#38bdf8;left:63px;top:96px}.g{background:#22c55e;color:#22c55e;left:102px;top:132px}.controls{position:absolute;inset:0;z-index:10;pointer-events:none}.btn{position:absolute;bottom:30px;width:170px;height:170px;border-radius:50%;border:4px solid rgba(125,211,252,.95);background:radial-gradient(circle,rgba(148,163,184,.32),rgba(15,23,42,.62));color:#e0f2fe;font-size:90px;font-weight:900;display:grid;place-items:center;box-shadow:0 0 28px rgba(56,189,248,.58),inset 0 0 30px rgba(56,189,248,.2);pointer-events:auto}.btn:active,.btn.on{transform:scale(.94);background:rgba(56,189,248,.42)}#left{left:70px}#right{right:150px}.nitroBtn{right:45px;bottom:210px;width:90px;height:90px;font-size:52px}.start{position:absolute;inset:0;z-index:30;background:rgba(2,6,23,.75);display:grid;place-items:center;text-align:center}.card{width:min(450px,90vw);padding:28px;border:2px solid #38bdf8;border-radius:20px;background:rgba(15,23,42,.94);box-shadow:0 0 40px rgba(56,189,248,.35)}.card h1{margin:0 0 8px;font-size:32px}.card p{color:#cbd5e1}.card button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;font-size:16px;padding:14px 24px}@media(max-width:850px){.pos{width:130px}.pos .num{font-size:45px;line-height:42px}.pos .sub{font-size:18px}.timer{width:170px}.timer .value{font-size:24px}.best{display:none}.speed{width:165px;height:105px}.speed .value{font-size:42px;line-height:42px}.gear{font-size:15px}.gear span{font-size:25px}.bars{display:none}.map{top:142px;width:110px;height:110px}.map:before{inset:18px;border-width:4px}.btn{width:105px;height:105px;font-size:55px;bottom:24px}#left{left:24px}#right{right:24px}.nitroBtn{display:none}}
</style>
</head>
<body>
<div id="app"><canvas id="game"></canvas>
<div class="hud">
<div class="panel pos"><div class="label">POSITION</div><span class="num" id="pos">2</span> <span class="sub">/4</span><div class="lapline"><span style="color:#fb7185;font-weight:900">LAP</span><span class="sub" id="lap">1/3</span></div></div>
<div class="panel timer"><div class="label">TIME</div><div class="value" id="time">00:00:00</div><div class="best"><span class="label">BEST</span><br>01:48:32</div></div>
<div class="panel speed"><canvas id="gauge" width="330" height="90" style="width:100%;height:90px"></canvas><div><span class="value" id="speed">0</span> KM/H</div><div class="gear">GEAR <span id="gear">1</span></div></div>
<div class="panel bars"><div><div class="barTitle" style="color:#22d3ee">⚡ NITRO</div><div class="bar" id="nitroBar"></div></div><div><div class="barTitle" style="color:#ef4444">▣ DAMAGE</div><div class="bar" id="damageBar"></div></div></div>
<div class="panel map"><span class="dot r"></span><span class="dot b"></span><span class="dot g"></span></div>
</div>
<div class="controls"><button class="btn" id="left">◀</button><button class="btn" id="right">▶</button><button class="btn nitroBtn" id="nitro">⚡</button></div>
<div class="start" id="start"><div class="card"><h1>Neon Racer Premium</h1><p>Visual gerado no próprio código, inspirado na referência. O carro acelera sozinho.</p><button id="play">INICIAR CORRIDA</button></div></div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),gctx=document.getElementById('gauge').getContext('2d');
const els={speed:document.getElementById('speed'),gear:document.getElementById('gear'),time:document.getElementById('time'),lap:document.getElementById('lap'),pos:document.getElementById('pos'),nitroBar:document.getElementById('nitroBar'),damageBar:document.getElementById('damageBar'),start:document.getElementById('start'),play:document.getElementById('play')};
let W=1366,H=768,D=1;const keys={l:false,r:false,n:false};const state={run:false,t:0,frame:0,dist:0,damage:25,nitro:78,lap:1};const player={lane:0,speed:0,max:315};const traffic=[];const buildings=[];
function rand(i){return Math.abs(Math.sin(i*999)*999)%1}function initCity(){buildings.length=0;for(let i=0;i<48;i++){buildings.push({x:i/48,w:.012+rand(i)*.034,h:.12+rand(i+2)*.28,c:['#f0abfc','#38bdf8','#facc15','#fb7185'][i%4]})}}function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;ctx.setTransform(D,0,0,D,0,0)}
function reset(){state.run=true;state.t=0;state.frame=0;state.dist=0;state.damage=25;state.nitro=78;state.lap=1;player.lane=0;player.speed=0;traffic.length=0;els.start.style.display='none';els.play.textContent='REINICIAR'}
function sky(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#16002f');g.addColorStop(.37,'#25145c');g.addColorStop(.62,'#071126');g.addColorStop(1,'#020617');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let i=0;i<90;i++){ctx.fillStyle=i%4?'rgba(255,255,255,.6)':'#f0abfc';ctx.fillRect((i*97)%W,(i*53)%(H*.28),1.5,1.5)}ctx.fillStyle='rgba(15,23,42,.35)';for(let i=0;i<8;i++){ctx.beginPath();let y=70+i*22;ctx.ellipse(W*(.1+i*.12),y,80,14,0,0,7);ctx.fill()}}
function city(){const hz=H*.43;ctx.fillStyle='#040817';ctx.fillRect(0,hz,W,H*.11);for(const b of buildings){let x=b.x*W,w=b.w*W,h=b.h*H,y=hz-h;ctx.fillStyle='#020617';ctx.fillRect(x,y,w,h);ctx.fillStyle=b.c;ctx.fillRect(x+w*.45,y-25,w*.1,25);for(let yy=y+12;yy<hz-8;yy+=16)for(let xx=x+5;xx<x+w-5;xx+=10)if(Math.sin(xx*.12+yy*.07+b.x*30)>-.2)ctx.fillRect(xx,yy,4,6)}
ctx.strokeStyle='#f0abfc';ctx.lineWidth=3;ctx.beginPath();ctx.arc(W*.58,hz-42,38,0,7);ctx.stroke();for(let a=0;a<8;a++){ctx.beginPath();ctx.moveTo(W*.58,hz-42);ctx.lineTo(W*.58+Math.cos(a*.78)*38,hz-42+Math.sin(a*.78)*38);ctx.stroke()}ctx.fillStyle='#ec4899';ctx.font=`900 ${Math.max(18,W*.023)}px monospace`;ctx.fillText('HORIZON',W*.15,hz-18);ctx.fillStyle='#22d3ee';ctx.fillText('WAVE',W*.75,hz-36);
ctx.strokeStyle='#0ea5e9';ctx.globalAlpha=.35;for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(0,hz+20+i*10);ctx.lineTo(W,hz+14+i*8);ctx.stroke()}ctx.globalAlpha=1}
function roadCurve(z){return Math.sin(state.dist*1.2+z*3.1)*.52+Math.sin(state.dist*.7+z*6)*.2}function rp(z){const hz=H*.47;return{x:W/2+roadCurve(z)*W*.18*z,y:hz+Math.pow(z,1.7)*(H-hz+95),w:W*(.08+z*.92)}}
function road(){for(let i=0;i<86;i++){let z1=i/86,z2=(i+1)/86,p1=rp(z1),p2=rp(z2);poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],i%2?'#111827':'#1f2937');poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+26,p2.y],[p2.x-p2.w/2-16,p2.y]],i%2?'#ef4444':'#f8fafc');poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+16,p2.y],[p2.x+p2.w/2-26,p2.y]],i%2?'#ef4444':'#f8fafc');if(i%7==0){poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+9,p2.y],[p2.x-9,p2.y]],'#e5e7eb')}}
for(let i=0;i<8;i++){let z=.24+i*.09,p=rp(z),side=i%2?1:-1;ctx.fillStyle='#facc15';ctx.shadowBlur=12;ctx.shadowColor='#facc15';ctx.font=`900 ${Math.max(18,z*55)}px Arial`;ctx.fillText(side>0?'››':'‹‹',p.x+side*p.w*.57,p.y);ctx.shadowBlur=0} }
function poly(points,c){ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}
function car(x,y,w,h,c,playerCar){ctx.save();ctx.shadowBlur=playerCar?18:8;ctx.shadowColor=c;ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.ellipse(x,y+h*.38,w*.48,h*.12,0,0,7);ctx.fill();let g=ctx.createLinearGradient(x-w/2,y-h/2,x+w/2,y+h/2);g.addColorStop(0,c);g.addColorStop(.6,c);g.addColorStop(1,'#080b16');ctx.fillStyle=g;rr(x-w/2,y-h/2,w,h,w*.12);ctx.fill();ctx.fillStyle='#030712';rr(x-w*.36,y-h*.33,w*.72,h*.26,8);ctx.fill();ctx.fillStyle='#111827';rr(x-w*.42,y-h*.48,w*.84,h*.16,8);ctx.fill();ctx.fillStyle='#bae6fd';rr(x-w*.28,y-h*.31,w*.56,h*.1,4);ctx.fill();ctx.fillStyle='#ef4444';rr(x-w*.38,y+h*.31,w*.2,h*.08,4);ctx.fill();rr(x+w*.18,y+h*.31,w*.2,h*.08,4);ctx.fill();ctx.fillStyle='#f8fafc';if(playerCar){ctx.font=`bold ${w*.13}px monospace`;ctx.fillText('XR-7',x-w*.12,y+h*.13)}ctx.restore()}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}
function carPos(lane,z){let p=rp(z);return{x:p.x+lane*p.w*.25,y:p.y,z}}function spawn(){let lanes=[-.95,0,.95];traffic.push({lane:lanes[Math.floor(Math.random()*3)],z:.06,c:['#2563eb','#f59e0b','#22c55e','#a855f7'][Math.floor(Math.random()*4)]})}
function update(){if(!state.run)return;state.frame++;state.t+=1/60;player.speed=Math.min(player.max,player.speed+(keys.n&&state.nitro>0?2.8:1.18));state.dist+=player.speed/115000;if(keys.l)player.lane-=.036;if(keys.r)player.lane+=.036;player.lane=Math.max(-1.35,Math.min(1.35,player.lane));if(keys.n&&state.nitro>0)state.nitro-=.55;else state.nitro=Math.min(100,state.nitro+.06);if(state.frame%62==0)spawn();for(const t of traffic)t.z+=.006+player.speed/37000;for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.18)traffic.splice(i,1);for(const t of traffic)if(Math.abs(t.z-.84)<.055&&Math.abs(t.lane-player.lane)<.34){state.damage=Math.min(100,state.damage+15);player.speed*=.5;t.z=1.3}if(state.t>40)state.lap=2;if(state.t>80)state.lap=3;if(state.damage>=100){state.run=false;els.start.style.display='grid'}}
function drawTraffic(){[...traffic].sort((a,b)=>a.z-b.z).forEach(t=>{let p=carPos(t.lane,t.z),w=Math.max(20,t.z*W*.085),h=w*1.45;car(p.x,p.y-h*.48,w,h,t.c,false)})}function playerDraw(){let p=carPos(player.lane,.84),w=Math.min(150,W*.16),h=w*1.45;car(p.x,H-h*.48,w,h,'#ef4444',true)}
function hud(){let m=Math.floor(state.t/60),s=Math.floor(state.t%60),c=Math.floor(state.t%1*100);els.time.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(c).padStart(2,'0')}`;els.speed.textContent=Math.floor(player.speed);els.gear.textContent=Math.max(1,Math.min(5,Math.floor(player.speed/65)+1));els.lap.textContent=state.lap+'/3';els.pos.textContent=state.damage>70?4:state.damage>40?3:2;bar(els.nitroBar,state.nitro,'n');bar(els.damageBar,state.damage,'d');gauge()}function bar(el,v,cls){el.innerHTML='';for(let i=0;i<10;i++){let s=document.createElement('div');s.className='seg'+(i<Math.round(v/10)?' '+cls:'');el.appendChild(s)}}
function gauge(){gctx.clearRect(0,0,330,90);for(let i=0;i<28;i++){let a=Math.PI*.95+i/27*Math.PI*.86,x=165+Math.cos(a)*145,y=160+Math.sin(a)*145;gctx.strokeStyle=i<11?'#22c55e':i<20?'#facc15':'#ef4444';gctx.lineWidth=8;gctx.beginPath();gctx.arc(165,160,145,a,a+.025);gctx.stroke()}gctx.fillStyle='#cbd5e1';gctx.font='bold 20px monospace';for(let i=0;i<10;i++)gctx.fillText(i,22+i*30,72)}
function render(){sky();city();road();drawTraffic();playerDraw();hud()}function loop(){update();render();requestAnimationFrame(loop)}function bind(btn,k){btn.onpointerdown=e=>{e.preventDefault();keys[k]=true;btn.classList.add('on')};btn.onpointerup=btn.onpointercancel=btn.onpointerleave=e=>{keys[k]=false;btn.classList.remove('on')}}bind(document.getElementById('left'),'l');bind(document.getElementById('right'),'r');bind(document.getElementById('nitro'),'n');addEventListener('keydown',e=>{if(e.key=='ArrowLeft')keys.l=true;if(e.key=='ArrowRight')keys.r=true;if(e.key==' ')keys.n=true});addEventListener('keyup',e=>{if(e.key=='ArrowLeft')keys.l=false;if(e.key=='ArrowRight')keys.r=false;if(e.key==' ')keys.n=false});addEventListener('resize',resize);els.play.onclick=reset;initCity();resize();loop();
</script>
</body>
</html>
