const A={bg:'assets/neon_lit_cyberpunk_city_by_the_water.png',cars:'assets/sports_car_showcase_in_neon_colors.png',road:'assets/neon_sci_fi_road_and_track_assets.png'};

const g=document.getElementById('g'),x=g.getContext('2d'),E={load:load,start:start,play:play,boost:boost,ai:ai,cr:cr,av:av,cv:cv,ac:ac,km:km,fill:fill};let W,H,D,ok=0,run=0,fr=0,dist=0,spd=0,lane=0,crash=0,avoid=0,curv=0,brake=0,lastS='clear',lastA='center',shake=0,flash=0,boostV=Number(localStorage.aiBoost||4),score=Number(localStorage.aiScore||25);const img={},sp={cars:{},road:null},cars=[],fx=[],lanes=[-1,0,1];let q=JSON.parse(localStorage.aiQ||'{}');
function L(n,s){return new Promise((r,j)=>{let i=new Image;i.onload=()=>{img[n]=i;r()};i.onerror=()=>j(s);i.src=s+'?v=ai100new'})}function crop(im,b,clean=1){let c=document.createElement('canvas'),z=c.getContext('2d');c.width=b.w;c.height=b.h;z.imageSmoothingEnabled=0;z.drawImage(im,b.x,b.y,b.w,b.h,0,0,b.w,b.h);if(clean){let d=z.getImageData(0,0,c.width,c.height),p=d.data;for(let i=0;i<p.length;i+=4)if(p[i]<30&&p[i+1]<30&&p[i+2]<36)p[i+3]=0;z.putImageData(d,0,0)}return c}function std(im){let c=document.createElement('canvas'),z=c.getContext('2d');c.width=512;c.height=384;z.imageSmoothingEnabled=0;let s=Math.min(470/im.width,338/im.height),w=im.width*s,h=im.height*s;z.drawImage(im,(512-w)/2,(384-h)/2,w,h);return c}function build(){C.forEach(o=>sp.cars[o.n]={img:std(crop(img.cars,o)),hit:o.hit});sp.road=crop(img.road,{x:45,y:45,w:435,h:310},0)}function resize(){let v=visualViewport;W=Math.max(320,Math.round(v?.width||innerWidth));H=Math.max(240,Math.round(v?.height||innerHeight));D=Math.min(devicePixelRatio||1,2);g.width=W*D;g.height=H*D;g.style.width=W+'px';g.style.height=H+'px';x.setTransform(D,0,0,D,0,0);x.imageSmoothingEnabled=0}function save(){localStorage.aiScore=score;localStorage.aiBoost=boostV;localStorage.aiQ=JSON.stringify(q)}function k(s,a){return s+'|'+a}function Q(s,a){return q[k(s,a)]||0}function add(s,a,v){q[k(s,a)]=Q(s,a)+v*boostV*2.2;save()}function rew(v){score=Math.max(0,Math.min(100,score+v*boostV));save()}function setBoost(){E.boost.textContent='TREINO '+boostV+'x'}function cycle(){boostV=boostV===4?8:boostV===8?16:boostV===16?32:4;setBoost();save()}
function curve(z=.82){let c=Math.sin(dist*.95+z*4.1)*.78+Math.sin(dist*.43+z*8.8)*.26,se=Math.min(1,Math.abs(c));return{c,se,dir:c>=0?1:-1,safe:Math.max(120,292-se*160)}}function rp(z){let hz=H*.5,c=curve(z).c;return{x:W/2+c*W*.18*z,y:hz+Math.pow(z,1.72)*(H-hz+95),w:W*(.08+z*.94)}}function pos(l,z){let p=rp(z);return{x:p.x+l*p.w*.25,y:p.y,z,w:p.w}}function near(){return cars.filter(o=>o.z>.15&&o.z<.98).sort((a,b)=>b.z-a.z)[0]||0}function free(l){return !cars.some(o=>o.z>.3&&o.z<1&&Math.abs(o.lane-l)<.36)}function hint(o){if(!o)return 0;let opts=[-1,0,1].filter(free);if(!opts.length)return'brake';opts.sort((a,b)=>Math.abs(a-lane)-Math.abs(b-lane));let b=opts[0];return b<lane?'left':b>lane?'right':'center'}function state(){let c=curve(),s=c.se>.62?'hard':c.se>.38?'mid':'straight';s+=c.dir>0?'R':'L';let n=near();if(n){let gap=n.z.toFixed(1);s+=Math.abs(n.lane-lane)<.46?'Block'+gap:n.lane<lane?'CarL'+gap:'CarR'+gap}return s}function choose(s){let c=curve(),n=near(),acts=['left','center','right','brake'];if(score>=95){if(n&&n.z>.36&&Math.abs(n.lane-lane)<.52)return hint(n);if(c.se>.42&&spd>c.safe)return'brake'}if(n&&n.z>.36&&n.z<.95&&Math.abs(n.lane-lane)<.5){let h=hint(n);if(h)return h}if(c.se>.45&&spd>c.safe&&score>50)return'brake';let eps=Math.max(0,.12-(score/100)*.11-(boostV-4)*.006);if(Math.random()<eps)return acts[Math.floor(Math.random()*acts.length)];let best=acts.slice().sort((a,b)=>Q(s,b)-Q(s,a))[0];return Q(s,best)?best:'center'}function AI(){let s=state(),a=choose(s);lastS=s;lastA=a;brake=a==='brake';if(a==='left')lane-=.075;if(a==='right')lane+=.075;if(a==='center')lane*=.985;lane=Math.max(-1.35,Math.min(1.35,lane));E.ac.textContent=brake?'frear':a}
function spawn(){let n=['b','y','u'];cars.push({lane:lanes[Math.floor(Math.random()*3)],z:.04,car:n[Math.floor(Math.random()*3)],ok:0,pass:0})}function boom(px,py,s){shake=18;flash=.65;for(let i=0;i<50;i++){let a=Math.random()*6.283,v=(Math.random()*4+2)*(s/160);fx.push({x:px,y:py,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2*Math.random(),life:30+30*Math.random(),max:60,r:(3+Math.random()*5)*(s/180),c:['#facc15','#fb923c','#ef4444','#fff','#22d3ee'][Math.floor(Math.random()*5)]})}}function fail(type,o){let p=pos(lane,.84),s=Math.min(260,W*.3);boom(p.x,H-s*.5,s);crash++;rew(-2.5);spd*=.45;add(lastS,lastA,-2.5);if(type==='curve'){add(lastS,'brake',2.6);add(lastS,curve().dir>0?'left':'right',1)}else{add(lastS,'center',-2.4);add(lastS,'brake',1.1);if(o){add(lastS,o.lane>=lane?'left':'right',3);let h=hint(o);if(h)add(lastS,h,3.4)}}}
function update(){if(!run){effects();return}fr++;let c=curve();spd=Math.max(40,Math.min(315,spd+(brake?-4.8:1.15)));dist+=spd/115000;AI();if(c.se>.38&&spd>c.safe)lane+=c.dir*((spd-c.safe)/210)*.028;if(Math.abs(lane)>1.24){fail('curve');lane=Math.max(-1.05,Math.min(1.05,lane))}if(fr%18===0&&c.se>.38&&spd<c.safe+30&&Math.abs(lane)<1.05){curv++;rew(.22);add(lastS,'brake',.18);add(lastS,'center',.05)}if(fr%58===0)spawn();cars.forEach(o=>o.z+=.006+spd/37000);cars.forEach(o=>{if(!o.ok&&o.z>.56&&o.z<.96&&Math.abs(o.lane-lane)>.42){o.ok=1;avoid++;rew(.35);add(lastS,lastA,1.6);add(lastS,'center',.2)}if(!o.pass&&o.z>.96){o.pass=1;rew(.1);add(state(),'center',.12)}});for(let i=cars.length-1;i>=0;i--)if(cars[i].z>1.2)cars.splice(i,1);cars.forEach(o=>{let hit=sp.cars[o.car].hit+sp.cars.p.hit;if(Math.abs(o.z-.84)<.055&&Math.abs(o.lane-lane)<hit){fail('car',o);o.z=1.3}});effects()}function effects(){fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.985;p.life--});for(let i=fx.length-1;i>=0;i--)if(fx[i].life<=0)fx.splice(i,1);shake*=.86;flash*=.86}
function cover(im,x0,y0,w,h){let r=Math.max(w/im.width,h/im.height),sw=w/r,sh=h/r;x.drawImage(im,(im.width-sw)/2,(im.height-sh)/2,sw,sh,x0,y0,w,h)}function poly(p,c){x.beginPath();x.moveTo(p[0][0],p[0][1]);p.slice(1).forEach(a=>x.lineTo(a[0],a[1]));x.closePath();x.fillStyle=c;x.fill()}function road(){let seg=116,scroll=(dist*40)%1,ph=Math.floor(dist*410);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);let p1=rp(z1),p2=rp(z2),alt=(i+ph)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'#0b1220ee':'#1f2937ee');x.globalAlpha=.32;x.drawImage(sp.road,0,(ph+i*3)%sp.road.height,sp.road.width,3,p1.x-p1.w/2,p1.y,p1.w,Math.max(2,p2.y-p1.y));x.globalAlpha=1;let cb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],cb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],cb);if((i+ph)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb')}}function car(o,px,py,s){x.save();x.shadowBlur=16;x.shadowColor='#38bdf8aa';x.drawImage(o.img,px-s/2,py-s*.375,s,s*.75);x.restore()}function draw(){if(!ok){x.fillStyle='#020617';x.fillRect(0,0,W,H);return}x.save();if(shake>.5)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);cover(img.bg,0,0,W,H);x.fillStyle='#02061728';x.fillRect(0,H*.45,W,H*.55);road();cars.sort((a,b)=>a.z-b.z).forEach(o=>{let p=pos(o.lane,o.z),s=Math.max(52,o.z*W*.19);car(sp.cars[o.car],p.x,p.y-s*.05,s)});let p=pos(lane,.84),s=Math.min(270,W*.31);car(sp.cars.p,p.x,H-s*.34,s);x.globalCompositeOperation='lighter';fx.forEach(p=>{x.globalAlpha=Math.max(0,p.life/p.max);x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,p.r,0,6.283);x.fill()});x.restore();x.globalAlpha=1;x.globalCompositeOperation='source-over';if(flash>.02){x.fillStyle='rgba(255,255,255,'+(flash*.35)+')';x.fillRect(0,0,W,H)}hud()}function hud(){E.ai.text
