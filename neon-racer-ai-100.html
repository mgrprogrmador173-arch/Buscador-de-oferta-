<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Neon Racer AI 100</title><style>*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100dvh;overflow:hidden;background:#020617;color:white;font-family:Arial,sans-serif}#app{position:fixed;inset:0;background:#020617;overflow:hidden}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.panel{position:absolute;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:5;width:min(820px,94vw);padding:10px;background:rgba(2,6,23,.88);border:2px solid #38bdf8;border-radius:12px;text-align:center;font-size:13px}.bar{height:14px;background:#020617;border:1px solid #334155;margin-top:6px}.fill{height:100%;background:#22c55e;width:0}.boost{position:absolute;right:12px;bottom:92px;z-index:8;border:2px solid #facc15;border-radius:16px;background:linear-gradient(135deg,#facc15,#fb923c);color:#1f1300;font-weight:900;padding:12px}.start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.78);text-align:center}.card{width:min(500px,92vw);padding:24px;background:#0f172a;border:2px solid #38bdf8;border-radius:18px;box-shadow:0 0 36px #0ea5e955}button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;padding:14px 22px}.load{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;background:#020617dd;border:1px solid #38bdf8;border-radius:12px;padding:12px 18px}.hidden{display:none!important}@media(max-width:760px){.panel{font-size:10px;padding:8px}.boost{right:8px;bottom:98px;font-size:11px}}</style></head><body><div id="app"><canvas id="g"></canvas><div id="loader" class="load">Carregando IA 100...</div><button id="boostBtn" class="boost">TREINO 4x</button><div class="panel"><b>AI</b> <span id="aiPct">0</span>% | Batidas: <span id="crashes">0</span> | Desvios: <span id="avoids">0</span> | Curvas: <span id="curves">0</span> | Ação: <span id="action">centro</span> | <span id="speedTxt">0</span> km/h<div class="bar"><div id="aiFill" class="fill"></div></div></div><div id="startScreen" class="start"><div class="card"><h1>Neon Racer AI 100</h1><p>A IA evolui até 100% aprendendo a desviar, frear e fazer curvas.</p><button id="playBtn">INICIAR TREINO</button></div></div></div><script>
'use strict';
const ASSETS={bg:'assets/neon_lit_cyberpunk_city_by_the_water.png',cars:'assets/sports_car_showcase_in_neon_colors.png',road:'assets/neon_sci_fi_road_and_track_assets.png'};
const BOXES=[{x:105,y:80,w:520,h:420,n:'p',hit:.27},{x:780,y:80,w:520,h:420,n:'b',hit:.29},{x:105,y:570,w:520,h:410,n:'y',hit:.29},{x:780,y:570,w:520,h:410,n:'u',hit:.29}];
const canvas=document.getElementById('g'),ctx=canvas.getContext('2d'),app=document.getElementById('app');
const ui={loader:document.getElementById('loader'),start:document.getElementById('startScreen'),play:document.getElementById('playBtn'),boost:document.getElementById('boostBtn'),ai:document.getElementById('aiPct'),cr:document.getElementById('crashes'),av:document.getElementById('avoids'),cv:document.getElementById('curves'),ac:document.getElementById('action'),km:document.getElementById('speedTxt'),fill:document.getElementById('aiFill')};
let W=innerWidth,H=innerHeight,D=1,ready=false,running=false,frame=0,dist=0,speed=0,lane=0,crashCount=0,avoidCount=0,curveCount=0,braking=false,lastState='clear',lastAction='center',shake=0,flash=0;
let boost=Number(localStorage.getItem('aiBoost')||4),score=Number(localStorage.getItem('aiScore')||25),q=JSON.parse(localStorage.getItem('aiQ')||'{}');
const img={},sprites={cars:{},road:null},traffic=[],particles=[],laneList=[-1,0,1];
function loadImage(name,src){return new Promise((resolve,reject)=>{const im=new Image();im.onload=()=>{img[name]=im;resolve()};im.onerror=()=>reject(new Error(src));im.src=src+'?v=fixscreen1';});}
function crop(im,b,clean=true){const c=document.createElement('canvas'),z=c.getContext('2d');c.width=b.w;c.height=b.h;z.imageSmoothingEnabled=false;z.drawImage(im,b.x,b.y,b.w,b.h,0,0,b.w,b.h);if(clean){const d=z.getImageData(0,0,c.width,c.height),p=d.data;for(let i=0;i<p.length;i+=4){if(p[i]<30&&p[i+1]<30&&p[i+2]<36)p[i+3]=0}z.putImageData(d,0,0)}return c}
function standard(im){const c=document.createElement('canvas'),z=c.getContext('2d');c.width=512;c.height=384;z.imageSmoothingEnabled=false;const s=Math.min(470/im.width,338/im.height),w=im.width*s,h=im.height*s;z.drawImage(im,(512-w)/2,(384-h)/2,w,h);return c}
function buildSprites(){BOXES.forEach(o=>sprites.cars[o.n]={img:standard(crop(img.cars,o,true)),hit:o.hit});sprites.road=crop(img.road,{x:45,y:45,w:435,h:310},false)}
function resize(){const v=window.visualViewport;W=Math.max(320,Math.round(v?.width||innerWidth));H=Math.max(240,Math.round(v?.height||innerHeight));D=Math.min(devicePixelRatio||1,2);app.style.width=W+'px';app.style.height=H+'px';canvas.width=Math.floor(W*D);canvas.height=Math.floor(H*D);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0);ctx.imageSmoothingEnabled=false}
function save(){localStorage.setItem('aiScore',String(score));localStorage.setItem('aiBoost',String(boost));localStorage.setItem('aiQ',JSON.stringify(q))}function key(s,a){return s+'|'+a}function Q(s,a){return q[key(s,a)]||0}function addQ(s,a,v){q[key(s,a)]=Q(s,a)+v*boost*2.2;save()}function reward(v){score=Math.max(0,Math.min(100,score+v*boost));save()}function setBoost(){ui.boost.textContent='TREINO '+boost+'x'}function cycleBoost(){boost=boost===4?8:boost===8?16:boost===16?32:4;setBoost();save()}
function curve(z=.82){const c=Math.sin(dist*.95+z*4.1)*.78+Math.sin(dist*.43+z*8.8)*.26,se=Math.min(1,Math.abs(c));return{c,se,dir:c>=0?1:-1,safe:Math.max(120,292-se*160)}}function roadPoint(z){const hz=H*.5,c=curve(z).c;return{x:W/2+c*W*.18*z,y:hz+Math.pow(z,1.72)*(H-hz+95),w:W*(.08+z*.94)}}function carPos(l,z){const p=roadPoint(z);return{x:p.x+l*p.w*.25,y:p.y,z,w:p.w}}
function nearest(){return traffic.filter(o=>o.z>.15&&o.z<.98).sort((a,b)=>b.z-a.z)[0]||null}function laneFree(l){return !traffic.some(o=>o.z>.3&&o.z<1&&Math.abs(o.lane-l)<.36)}function avoidHint(o){if(!o)return null;const opts=laneList.filter(laneFree);if(!opts.length)return'brake';opts.sort((a,b)=>Math.abs(a-lane)-Math.abs(b-lane));const best=opts[0];return best<lane?'left':best>lane?'right':'center'}function state(){const c=curve();let s=c.se>.62?'hard':c.se>.38?'mid':'straight';s+=c.dir>0?'R':'L';const n=nearest();if(n){const gap=n.z.toFixed(1);s+=Math.abs(n.lane-lane)<.46?'Block'+gap:n.lane<lane?'CarL'+gap:'CarR'+gap}return s}function choose(s){const c=curve(),n=nearest(),acts=['left','center','right','brake'];if(score>=95){if(n&&n.z>.36&&Math.abs(n.lane-lane)<.52)return avoidHint(n);if(c.se>.42&&speed>c.safe)return'brake'}if(n&&n.z>.36&&n.z<.95&&Math.abs(n.lane-lane)<.5){const h=avoidHint(n);if(h)return h}if(c.se>.45&&speed>c.safe&&score>50)return'brake';const eps=Math.max(0,.12-(score/100)*.11-(boost-4)*.006);if(Math.random()<eps)return acts[Math.floor(Math.random()*acts.length)];const best=acts.slice().sort((a,b)=>Q(s,b)-Q(s,a))[0];return Q(s,best)?best:'center'}function aiStep(){const s=state(),a=choose(s);lastState=s;lastAction=a;braking=a==='brake';if(a==='left')lane-=.075;if(a==='right')lane+=.075;if(a==='center')lane*=.985;lane=Math.max(-1.35,Math.min(1.35,lane));ui.ac.textContent=braking?'frear':a}
function spawn(){const names=['b','y','u'];traffic.push({lane:laneList[Math.floor(Math.random()*3)],z:.04,car:names[Math.floor(Math.random()*3)],ok:false,passed:false})}function explosion(px,py,s){shake=18;flash=.65;for(let i=0;i<50;i++){const a=Math.random()*6.283,v=(Math.random()*4+2)*(s/160);particles.push({x:px,y:py,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2*Math.random(),life:30+30*Math.random(),max:60,r:(3+Math.random()*5)*(s/180),c:['#facc15','#fb923c','#ef4444','#fff','#22d3ee'][Math.floor(Math.random()*5)]})}}function fail(type,o){const p=carPos(lane,.84),s=Math.min(260,W*.3);explosion(p.x,H-s*.5,s);crashCount++;reward(-2.5);speed*=.45;addQ(lastState,lastAction,-2.5);if(type==='curve'){addQ(lastState,'brake',2.6);addQ(lastState,curve().dir>0?'left':'right',1)}else{addQ(lastState,'center',-2.4);addQ(lastState,'brake',1.1);if(o){addQ(lastState,o.lane>=lane?'left':'right',3);const h=avoidHint(o);if(h)addQ(lastState,h,3.4)}}}
function update(){if(!running){updateParticles();return}frame++;const c=curve();speed=Math.max(40,Math.min(315,speed+(braking?-4.8:1.15)));dist+=speed/115000;aiStep();if(c.se>.38&&speed>c.safe)lane+=c.dir*((speed-c.safe)/210)*.028;if(Math.abs(lane)>1.24){fail('curve');lane=Math.max(-1.05,Math.min(1.05,lane))}if(frame%18===0&&c.se>.38&&speed<c.safe+30&&Math.abs(lane)<1.05){curveCount++;reward(.22);addQ(lastState,'brake',.18);addQ(lastState,'center',.05)}if(frame%58===0)spawn();traffic.forEach(o=>o.z+=.006+speed/37000);traffic.forEach(o=>{if(!o.ok&&o.z>.56&&o.z<.96&&Math.abs(o.lane-lane)>.42){o.ok=true;avoidCount++;reward(.35);addQ(lastState,lastAction,1.6);addQ(lastState,'center',.2)}if(!o.passed&&o.z>.96){o.passed=true;reward(.1);addQ(state(),'center',.12)}});for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.2)traffic.splice(i,1);traffic.forEach(o=>{const hit=sprites.cars[o.car].hit+sprites.cars.p.hit;if(Math.abs(o.z-.84)<.055&&Math.abs(o.lane-lane)<hit){fail('car',o);o.z=1.3}});updateParticles()}function updateParticles(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.985;p.life--});for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);shake*=.86;flash*=.86}
function cover(im,x0,y0,w,h){const r=Math.max(w/im.width,h/im.height),sw=w/r,sh=h/r;ctx.drawImage(im,(im.width-sw)/2,(im.height-sh)/2,sw,sh,x0,y0,w,h)}function poly(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)ctx.lineTo(p[i][0],p[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}function drawRoad(){const seg=116,scroll=(dist*40)%1,ph=Math.floor(dist*410);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);const p1=roadPoint(z1),p2=roadPoint(z2),alt=(i+ph)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'#0b1220ee':'#1f2937ee');ctx.globalAlpha=.32;ctx.drawImage(sprites.road,0,(ph+i*3)%sprites.road.height,sprites.road.width,3,p1.x-p1.w/2,p1.y,p1.w,Math.max(2,p2.y-p1.y));ctx.globalAlpha=1;const curb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],curb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],curb);if((i+ph)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb')}}function drawCar(o,px,py,s){ctx.save();ctx.shadowBlur=16;ctx.shadowColor='#38bdf8aa';ctx.drawImage(o.img,px-s/2,py-s*.375,s,s*.75);ctx.restore()}function draw(){if(!ready){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);return}ctx.save();if(shake>.5)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);cover(img.bg,0,0,W,H);ctx.fillStyle='#02061728';ctx.fillRect(0,H*.45,W,H*.55);drawRoad();traffic.sort((a,b)=>a.z-b.z).forEach(o=>{const p=carPos(o.lane,o.z),s=Math.max(52,o.z*W*.19);drawCar(sprites.cars[o.car],p.x,p.y-s*.05,s)});const p=carPos(lane,.84),s=Math.min(270,W*.31);drawCar(sprites.cars.p,p.x,H-s*.34,s);ctx.globalCompositeOperation='lighter';particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.283);ctx.fill()});ctx.restore();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';if(flash>.02){ctx.fillStyle='rgba(255,255,255,'+(flash*.35)+')';ctx.fillRect(0,0,W,H)}hud()}function hud(){ui.ai.textContent=Math.floor(score);ui.cr.textContent=crashCount;ui.av.textContent=avoidCount;ui.cv.textContent=curveCount;ui.km.textContent=Math.floor(speed);ui.fill.style.width=Math.floor(score)+'%'}function loop(){update();draw();requestAnimationFrame(loop)}
ui.play.onclick=()=>{running=true;frame=0;dist=0;speed=0;lane=0;braking=false;traffic.length=0;particles.length=0;crashCount=avoidCount=curveCount=0;ui.start.classList.add('hidden')};ui.boost.onclick=cycleBoost;setBoost();addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,250));window.visualViewport?.addEventListener('resize',resize);resize();Promise.all([loadImage('bg',ASSETS.bg),loadImage('cars',ASSETS.cars),loadImage('road',ASSETS.road)]).then(()=>{buildSprites();ready=true;ui.loader.classList.add('hidden')}).catch(e=>{ui.loader.textContent='Erro ao carregar: '+e.message});loop();
</script></body></html>
