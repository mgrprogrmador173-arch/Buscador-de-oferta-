<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Neon Racer AI Sprites Pro</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;font-family:Arial,Helvetica,sans-serif;color:white}#app{position:fixed;inset:0;background:#020617}canvas{position:fixed;inset:0;width:100%;height:100%;display:block}.hud{position:absolute;inset:0;z-index:5;pointer-events:none}.aiPanel{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:min(660px,92vw);padding:10px 12px;text-align:center;background:rgba(2,6,23,.82);border:2px solid #38bdf8;border-radius:12px;box-shadow:0 0 20px rgba(56,189,248,.25);font-size:14px}.bar{height:14px;border:1px solid #334155;background:#020617;margin-top:7px}.fill{height:100%;background:#22c55e;width:0%}.start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.76);text-align:center}.card{width:min(470px,92vw);padding:24px;background:rgba(15,23,42,.95);border:2px solid #38bdf8;border-radius:18px;box-shadow:0 0 36px rgba(56,189,248,.3)}button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;padding:14px 22px;font-size:16px}.loading{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;color:#e0f2fe;background:rgba(2,6,23,.85);border:1px solid #38bdf8;border-radius:12px;padding:12px 18px}.hidden{display:none!important}@media(max-width:760px){.aiPanel{font-size:12px;bottom:8px}}
</style>
</head>
<body>
<div id="app"><canvas id="game"></canvas><div id="loading" class="loading">Carregando sprites PNG...</div><div class="hud"><div class="aiPanel"><b>AI:</b> <span id="mode">APRENDENDO</span> | Batidas: <span id="crashes">0</span> | Desvios: <span id="avoids">0</span> | Aprendizado: <span id="learn">0</span>% | Política: <span id="policy">centro</span><div class="bar"><div id="fill" class="fill"></div></div></div></div><div class="start" id="start"><div class="card"><h1>Neon Racer AI + Sprites Pro</h1><p>Sprites separados em canvases individuais, tamanhos padronizados e colisão ajustada carro por carro.</p><button id="play">INICIAR TREINO</button></div></div></div>
<script>
const ASSETS={bg:'assets/neon_lit_cyberpunk_city_by_the_water.png',cars:'assets/retro_pixel_cars_in_neon_grid.png',hud:'assets/neon_pixel_racing_game_hud.png',env:'assets/neon_night_racing_game_assets.png'};
const CAR_BOXES=[{x:88,y:178,w:498,h:365,name:'player',hit:.28},{x:670,y:176,w:506,h:365,name:'blue',hit:.30},{x:86,y:665,w:500,h:350,name:'yellow',hit:.30},{x:670,y:665,w:506,h:350,name:'purple',hit:.30}];
const HUD_BOXES={speed:{x:56,y:48,w:560,h:365},time:{x:634,y:90,w:435,h:165},position:{x:1096,y:88,w:300,h:330},minimap:{x:92,y:446,w:390,h:314},nitro:{x:631,y:451,w:575,h:145},damage:{x:631,y:614,w:575,h:145}};
const ENV_BOXES={chevron:{x:1096,y:48,w:280,h:140},sign:{x:52,y:236,w:420,h:245},palm:{x:548,y:168,w:210,h:350},lamp:{x:775,y:165,w:180,h:360},wheel:{x:1040,y:188,w:300,h:260},guard:{x:55,y:465,w:600,h:170},curb:{x:765,y:500,w:520,h:110}};
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const el={loading:document.getElementById('loading'),start:document.getElementById('start'),play:document.getElementById('play'),crashes:document.getElementById('crashes'),avoids:document.getElementById('avoids'),learn:document.getElementById('learn'),policy:document.getElementById('policy'),fill:document.getElementById('fill')};
let W=innerWidth,H=innerHeight,D=1,ready=false;const imgs={},sprites={cars:{},hud:{},env:{}};const lanes=[-1,0,1];let traffic=[],running=false,frame=0,t=0,dist=0,speed=0,lane=0,crashes=0,avoids=0;let q=JSON.parse(localStorage.getItem('neon_ai_exact_sprite_q_pro')||'{}');
function loadImage(name,src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>{imgs[name]=i;res(i)};i.onerror=()=>rej(new Error(src));i.src=src+'?v=pro1';});}
function cropTransparent(img,box,pad=0){const c=document.createElement('canvas');c.width=box.w+pad*2;c.height=box.h+pad*2;const x=c.getContext('2d');x.imageSmoothingEnabled=false;x.drawImage(img,box.x,box.y,box.w,box.h,pad,pad,box.w,box.h);const d=x.getImageData(0,0,c.width,c.height),p=d.data;for(let i=0;i<p.length;i+=4){if(p[i]<32&&p[i+1]<32&&p[i+2]<40)p[i+3]=0;}x.putImageData(d,0,0);return trimCanvas(c)}
function trimCanvas(source){const x=source.getContext('2d'),d=x.getImageData(0,0,source.width,source.height).data;let minX=source.width,minY=source.height,maxX=0,maxY=0,found=false;for(let y=0;y<source.height;y++){for(let x0=0;x0<source.width;x0++){const a=d[(y*source.width+x0)*4+3];if(a>20){found=true;if(x0<minX)minX=x0;if(y<minY)minY=y;if(x0>maxX)maxX=x0;if(y>maxY)maxY=y}}}if(!found)return source;const w=maxX-minX+1,h=maxY-minY+1,out=document.createElement('canvas');out.width=w;out.height=h;out.getContext('2d').drawImage(source,minX,minY,w,h,0,0,w,h);return out}
function makeStandardSprite(img,w=512,h=384,scaleFill=.86){const out=document.createElement('canvas');out.width=w;out.height=h;const x=out.getContext('2d');x.imageSmoothingEnabled=false;const s=Math.min((w*scaleFill)/img.width,(h*scaleFill)/img.height);const dw=Math.round(img.width*s),dh=Math.round(img.height*s);x.drawImage(img,Math.round((w-dw)/2),Math.round((h-dh)/2),dw,dh);return out}
function buildSprites(){CAR_BOXES.forEach(b=>{sprites.cars[b.name]={img:makeStandardSprite(cropTransparent(imgs.cars,b,12)),hit:b.hit}});Object.entries(HUD_BOXES).forEach(([k,b])=>sprites.hud[k]=cropTransparent(imgs.hud,b,0));Object.entries(ENV_BOXES).forEach(([k,b])=>sprites.env[k]=cropTransparent(imgs.env,b,0));}
function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;ctx.setTransform(D,0,0,D,0,0);ctx.imageSmoothingEnabled=false}
function key(s,a){return s+'|'+a}function getQ(s,a){return q[key(s,a)]??0}function addQ(s,a,v){q[key(s,a)]=getQ(s,a)+v;localStorage.setItem('neon_ai_exact_sprite_q_pro',JSON.stringify(q))}
function reset(){running=true;frame=0;t=0;dist=0;speed=0;lane=0;traffic=[];crashes=0;avoids=0;el.start.classList.add('hidden')}
function roadCurve(z){return Math.sin(dist*1.2+z*3)*.5+Math.sin(dist*.7+z*6)*.16}
function rp(z){const hz=H*.50;return{x:W/2+roadCurve(z)*W*.16*z,y:hz+Math.pow(z,1.72)*(H-hz+95),w:W*(.08+z*.94)}}function carPos(l,z){const p=rp(z);return{x:p.x+l*p.w*.25,y:p.y,z,w:p.w}}
function state(){const near=traffic.filter(c=>c.z>.35&&c.z<.9).sort((a,b)=>b.z-a.z)[0];if(!near)return'clear';const rel=near.lane-lane;if(Math.abs(rel)<.35)return'blocked';return rel<0?'leftcar':'rightcar'}function chooseAction(s){const eps=Math.max(.05,.35-crashes*.025-avoids*.002);if(Math.random()<eps)return[-1,0,1][Math.floor(Math.random()*3)];return[-1,0,1].sort((a,b)=>getQ(s,b)-getQ(s,a))[0]}function ai(){const s=state(),a=chooseAction(s);lane+=a*.055;lane=Math.max(-1.25,Math.min(1.25,lane));el.policy.textContent=a<0?'esquerda':a>0?'direita':'centro'}
function spawn(){const names=['blue','yellow','purple'];traffic.push({lane:lanes[Math.floor(Math.random()*3)],z:.04,car:names[Math.floor(Math.random()*names.length)],passed:false})}
function update(){if(!running)return;frame++;t+=1/60;speed=Math.min(315,speed+1.2);dist+=speed/115000;ai();if(frame%58===0)spawn();for(const c of traffic)c.z+=.006+speed/37000;for(const c of traffic){if(!c.passed&&c.z>.86){c.passed=true;avoids++;addQ(state(),0,.02)}}for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.2)traffic.splice(i,1);for(const c of traffic){const hit=(sprites.cars[c.car]?.hit||.3)+sprites.cars.player.hit;if(Math.abs(c.z-.84)<.055&&Math.abs(c.lane-lane)<hit){crashes++;speed*=.45;addQ('blocked',0,-1.2);addQ('blocked',c.lane>=0?-1:1,.8);c.z=1.3}}}
function coverImage(img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),sw=w/r,sh=h/r,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}function drawBackground(){coverImage(imgs.bg,0,0,W,H);ctx.fillStyle='rgba(2,6,23,.16)';ctx.fillRect(0,H*.45,W,H*.55)}function poly(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)ctx.lineTo(p[i][0],p[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}
function drawRoad(){const seg=106,scroll=(dist*38)%1,phase=Math.floor(dist*380);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);const p1=rp(z1),p2=rp(z2),alt=(i+phase)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'rgba(8,14,28,.94)':'rgba(31,41,55,.94)');const curb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],curb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],curb);if((i+phase)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb');if(i%5===0&&z1>.28){ctx.globalAlpha=.2;ctx.strokeStyle=i%2?'#38bdf8':'#f97316';ctx.lineWidth=Math.max(1,z1*3);ctx.beginPath();ctx.moveTo(p1.x-p1.w*.28,p1.y);ctx.lineTo(p2.x-p2.w*.22,p2.y);ctx.stroke();ctx.globalAlpha=1}}}
function drawEnv(){const scroll=(dist*13)%1;for(let i=0;i<9;i++){const z=.2+((i*.11+scroll)%.78),p=rp(z),side=i%2?1:-1,w=95*z+38,h=w*.5,x=p.x+side*p.w*.57,y=p.y-h*.8;ctx.drawImage(sprites.env.chevron,x,y,w,h)}for(let i=0;i<3;i++){const z=.34+((i*.25+scroll*.7)%.52),p=rp(z),w=145*z+72,h=w*.58;ctx.drawImage(sprites.env.sign,p.x+p.w*.34,p.y-h,w,h)}}
function drawCarSprite(obj,x,y,size){const w=size,h=size*.75;ctx.save();ctx.shadowBlur=14;ctx.shadowColor='rgba(56,189,248,.6)';ctx.drawImage(obj.img,x-w/2,y-h/2,w,h);ctx.restore()}
function drawCars(){[...traffic].sort((a,b)=>a.z-b.z).forEach(c=>{const p=carPos(c.lane,c.z),size=Math.max(46,c.z*W*.165);drawCarSprite(sprites.cars[c.car],p.x,p.y-size*.05,size)});const p=carPos(lane,.84),size=Math.min(230,W*.265);drawCarSprite(sprites.cars.player,p.x,H-size*.34,size)}
function drawHudSprites(){const left=14,top=14,right=W-14;ctx.save();ctx.globalAlpha=.96;ctx.drawImage(sprites.hud.position,left,top,210,170);ctx.drawImage(sprites.hud.time,W/2-170,top,340,110);ctx.drawImage(sprites.hud.speed,right-320,top,320,245);ctx.drawImage(sprites.hud.minimap,left,194,170,140);ctx.drawImage(sprites.hud.nitro,right-290,220,260,66);ctx.drawImage(sprites.hud.damage,right-290,294,260,66);ctx.restore();ctx.fillStyle='white';ctx.textAlign='center';ctx.font='900 25px monospace';ctx.fillText('BATIDAS '+crashes,120,72);ctx.font='900 22px monospace';ctx.fillText('AI '+Math.floor(speed)+' KM/H',W/2,62);ctx.textAlign='right';ctx.font='900 28px monospace';ctx.fillText(Math.floor(speed)+' KM/H',W-46,112);ctx.textAlign='left'}
function hud(){el.crashes.textContent=crashes;el.avoids.textContent=avoids;const learn=Math.min(100,Math.floor((avoids/(avoids+crashes+1))*100));el.learn.textContent=learn;el.fill.style.width=learn+'%'}function render(){if(!ready){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);return}drawBackground();drawRoad();drawEnv();drawCars();drawHudSprites();hud()}function loop(){update();render();requestAnimationFrame(loop)}
el.play.onclick=reset;addEventListener('resize',resize);resize();Promise.all([loadImage('bg',ASSETS.bg),loadImage('cars',ASSETS.cars),loadImage('hud',ASSETS.hud),loadImage('env',ASSETS.env)]).then(()=>{buildSprites();ready=true;el.loading.classList.add('hidden')}).catch(err=>{el.loading.textContent='Erro ao carregar: '+err.message});loop();
</script>
</body></html>
