<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Neon Racer AI + Sprites</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;font-family:Arial,sans-serif;color:white}#app,canvas{position:fixed;inset:0}canvas{width:100%;height:100%;display:block}.hud{position:absolute;inset:0;z-index:5;pointer-events:none}.panel{position:absolute;background:rgba(2,6,23,.82);border:2px solid #38bdf8;border-radius:12px;padding:10px;box-shadow:0 0 20px rgba(56,189,248,.25)}.top{top:12px;left:12px}.center{top:12px;left:50%;transform:translateX(-50%);text-align:center}.right{top:12px;right:12px;text-align:right}.ai{bottom:14px;left:50%;transform:translateX(-50%);width:min(560px,92vw);text-align:center}.label{color:#38bdf8;font-weight:900;font-size:13px}.big{font-size:42px;font-weight:900;color:#facc15}.value{font-size:30px;font-weight:900}.start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.76);text-align:center}.card{width:min(430px,92vw);padding:24px;background:rgba(15,23,42,.95);border:2px solid #38bdf8;border-radius:18px;box-shadow:0 0 36px rgba(56,189,248,.3)}button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;padding:14px 22px;font-size:16px}.bar{height:14px;border:1px solid #334155;background:#020617;margin-top:7px}.fill{height:100%;background:#22c55e;width:0%}@media(max-width:760px){.value{font-size:22px}.big{font-size:30px}.ai{font-size:12px}}</style></head><body><div id="app"><canvas id="game"></canvas><div class="hud"><div class="panel top"><div class="label">BATIDAS</div><div class="big" id="crashes">0</div></div><div class="panel center"><div class="label">AI PILOTO</div><div class="value" id="mode">APRENDENDO</div></div><div class="panel right"><div class="label">SPEED</div><div class="value"><span id="speed">0</span> KM/H</div></div><div class="panel ai"><div><b>Aprendizado:</b> <span id="learn">0</span>% | Desvios certos: <span id="avoids">0</span> | Política: <span id="policy">centro</span></div><div class="bar"><div class="fill" id="fill"></div></div></div></div><div class="start" id="start"><div class="card"><h1>Neon Racer AI + Sprites</h1><p>Visual otimizado com sprites/imagens geradas e piloto automático que aprende com batidas.</p><button id="play">INICIAR TREINO</button></div></div></div><script>const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');const e={start:document.getElementById('start'),play:document.getElementById('play'),speed:document.getElementById('speed'),crashes:document.getElementById('crashes'),learn:document.getElementById('learn'),avoids:document.getElementById('avoids'),policy:document.getElementById('policy'),fill:document.getElementById('fill')};let W,H,D;const lanes=[-1,0,1];let traffic=[];let running=false,frame=0,t=0,dist=0,speed=0,lane=0,crashes=0,avoids=0;let q=JSON.parse(localStorage.getItem('neon_ai_q_sprites')||'{}');function key(s,a){return s+'|'+a}function getQ(s,a){return q[key(s,a)]??0}function addQ(s,a,v){q[key(s,a)]=getQ(s,a)+v;localStorage.setItem('neon_ai_q_sprites',JSON.stringify(q))}function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;ctx.setTransform(D,0,0,D,0,0)}function reset(){running=true;frame=0;t=0;dist=0;speed=0;lane=0;traffic=[];crashes=0;avoids=0;e.start.style.display='none'}function curve(z){return Math.sin(dist*1.2+z*3)*.5}function rp(z){let hz=H*.48;return{x:W/2+curve(z)*W*.17*z,y:hz+Math.pow(z,1.7)*(H-hz+90),w:W*(.08+z*.92)}}function pos(l,z){let p=rp(z);return{x:p.x+l*p.w*.25,y:p.y,w:p.w,z}}function state(){let near=traffic.filter(c=>c.z>.35&&c.z<.9).sort((a,b)=>b.z-a.z)[0];if(!near)return'clear';let rel=near.lane-lane;if(Math.abs(rel)<.35)return'blocked';return rel<0?'leftcar':'rightcar'}function chooseAction(s){let eps=Math.max(.05,.35-crashes*.025-avoids*.002);if(Math.random()<eps)return[-1,0,1][Math.floor(Math.random()*3)];let actions=[-1,0,1];actions.sort((a,b)=>getQ(s,b)-getQ(s,a));return actions[0]}function ai(){let s=state(),a=chooseAction(s);lane+=a*.055;lane=Math.max(-1.25,Math.min(1.25,lane));e.policy.textContent=a<0?'esquerda':a>0?'direita':'centro'}function spawn(){let l=lanes[Math.floor(Math.random()*3)];traffic.push({lane:l,z:.04,c:['#2563eb','#f59e0b','#a855f7'][Math.floor(Math.random()*3)],passed:false})}function update(){if(!running)return;frame++;t+=1/60;speed=Math.min(315,speed+1.2);dist+=speed/115000;ai();if(frame%58===0)spawn();for(const c of traffic)c.z+=.006+speed/37000;for(const c of traffic){if(!c.passed&&c.z>.86){c.passed=true;avoids++;addQ(state(),0,.02)}}for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.2)traffic.splice(i,1);for(const c of traffic){if(Math.abs(c.z-.84)<.055&&Math.abs(c.lane-lane)<.34){crashes++;speed*=.45;addQ('blocked',0,-1.2);addQ('blocked',c.lane>=0?-1:1,.8);c.z=1.3}}}function bg(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#16002f');g.addColorStop(.42,'#25145c');g.addColorStop(.7,'#020617');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);let hz=H*.43;ctx.fillStyle='#020617';ctx.fillRect(0,hz,W,H*.12);for(let i=0;i<52;i++){let x=i/52*W,w=(.014+Math.abs(Math.sin(i))*0.04)*W,h=(.12+Math.abs(Math.sin(i*2.1))*.28)*H,y=hz-h;ctx.fillStyle='#030712';ctx.fillRect(x,y,w,h);ctx.fillStyle=['#f0abfc','#38bdf8','#facc15','#fb7185'][i%4];for(let yy=y+12;yy<hz-8;yy+=16)for(let xx=x+5;xx<x+w-5;xx+=10)if(Math.sin(xx*.12+yy*.07+i)>-.2)ctx.fillRect(xx,yy,4,6)}ctx.strokeStyle='#f0abfc';ctx.lineWidth=3;ctx.beginPath();ctx.arc(W*.72,hz-45,42,0,7);ctx.stroke();ctx.fillStyle='#22d3ee';ctx.font='900 '+Math.max(18,W*.023)+'px monospace';ctx.fillText('HORIZON',W*.14,hz-18)}function poly(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)ctx.lineTo(p[i][0],p[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}function road(){let seg=106,scroll=(dist*38)%1,phase=Math.floor(dist*380);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);let p1=rp(z1),p2=rp(z2),alt=(i+phase)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'#0b1220':'#1f2937');let curb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],curb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],curb);if((i+phase)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb');if(i%5===0&&z1>.28){ctx.globalAlpha=.18;ctx.strokeStyle=i%2?'#38bdf8':'#f97316';ctx.lineWidth=Math.max(1,z1*3);ctx.beginPath();ctx.moveTo(p1.x-p1.w*.28,p1.y);ctx.lineTo(p2.x-p2.w*.22,p2.y);ctx.stroke();ctx.globalAlpha=1}}}function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}function car(x,y,w,h,c,player){ctx.save();ctx.shadowBlur=player?18:12;ctx.shadowColor=c;ctx.fillStyle='rgba(0,0,0,.45)';ctx.beginPath();ctx.ellipse(x,y+h*.38,w*.48,h*.12,0,0,7);ctx.fill();let g=ctx.createLinearGradient(x-w/2,y-h/2,x+w/2,y+h/2);g.addColorStop(0,c);g.addColorStop(.55,c);g.addColorStop(1,'#080b16');ctx.fillStyle=g;rr(x-w/2,y-h/2,w,h,w*.12);ctx.fill();ctx.fillStyle='#030712';rr(x-w*.36,y-h*.33,w*.72,h*.26,8);ctx.fill();ctx.fillStyle='#111827';rr(x-w*.42,y-h*.48,w*.84,h*.16,8);ctx.fill();ctx.fillStyle='#bae6fd';rr(x-w*.28,y-h*.31,w*.56,h*.1,4);ctx.fill();ctx.fillStyle='#ef4444';rr(x-w*.38,y+h*.31,w*.2,h*.08,4);ctx.fill();rr(x+w*.18,y+h*.31,w*.2,h*.08,4);ctx.fill();if(player){ctx.fillStyle='#fff';ctx.font='bold '+Math.max(10,w*.13)+'px monospace';ctx.fillText('AI',x-w*.08,y+h*.13)}ctx.restore()}function cars(){[...traffic].sort((a,b)=>a.z-b.z).forEach(c=>{let p=pos(c.lane,c.z),w=Math.max(20,c.z*W*.085),h=w*1.45;car(p.x,p.y-h*.48,w,h,c.c,false)});let p=pos(lane,.84),w=Math.min(150,W*.16),h=w*1.45;car(p.x,H-h*.48,w,h,'#ef4444',true)}function hud(){e.speed.textContent=Math.floor(speed);e.crashes.textContent=crashes;let learn=Math.min(100,Math.floor((avoids/(avoids+crashes+1))*100));e.learn.textContent=learn;e.avoids.textContent=avoids;e.fill.style.width=learn+'%'}function render(){bg();road();cars();hud()}function loop(){update();render();requestAnimationFrame(loop)}e.play.onclick=reset;addEventListener('resize',resize);resize();loop();</script></body></html>
