<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Neon Racer AI Sprites Pro</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100%;height:100dvh;overflow:hidden;background:#020617;font-family:Arial,Helvetica,sans-serif;color:#fff;overscroll-behavior:none}#app{position:fixed;left:0;top:0;width:100vw;height:100dvh;background:#020617;overflow:hidden}canvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block}.hud{position:absolute;inset:0;z-index:5;pointer-events:none}.aiPanel{position:absolute;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(660px,92vw);padding:10px 12px;text-align:center;background:rgba(2,6,23,.82);border:2px solid #38bdf8;border-radius:12px;box-shadow:0 0 20px rgba(56,189,248,.25);font-size:14px}.bar{height:14px;border:1px solid #334155;background:#020617;margin-top:7px}.fill{height:100%;background:#22c55e;width:0%}.start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.76);text-align:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}.card{width:min(470px,92vw);padding:24px;background:rgba(15,23,42,.95);border:2px solid #38bdf8;border-radius:18px;box-shadow:0 0 36px rgba(56,189,248,.3)}button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;padding:14px 22px;font-size:16px}.loading{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;color:#e0f2fe;background:rgba(2,6,23,.85);border:1px solid #38bdf8;border-radius:12px;padding:12px 18px}.hidden{display:none!important}@media(max-width:760px){.aiPanel{font-size:12px;bottom:max(8px,env(safe-area-inset-bottom));padding:8px 10px}}</style></head><body><div id="app"><canvas id="game"></canvas><div id="loading" class="loading">Carregando sprites PNG...</div><div class="hud"><div class="aiPanel"><b>AI:</b> <span id="mode">APRENDENDO</span> | Batidas: <span id="crashes">0</span> | Desvios: <span id="avoids">0</span> | Aprendizado: <span id="learn">0</span>% | Política: <span id="policy">centro</span><div class="bar"><div id="fill" class="fill"></div></div></div></div><div class="start" id="start"><div class="card"><h1>Neon Racer AI + Sprites Pro</h1><p>Tela ajustável ao celular, efeitos visuais de colisão e som ativado ao iniciar.</p><button id="play">INICIAR TREINO</button></div></div></div><script>
const ASSETS={bg:'assets/neon_lit_cyberpunk_city_by_the_water.png',cars:'assets/retro_pixel_cars_in_neon_grid.png',hud:'assets/neon_pixel_racing_game_hud.png',env:'assets/neon_night_racing_game_assets.png'};
const CAR_BOXES=[{x:88,y:178,w:498,h:365,name:'player',hit:.28},{x:670,y:176,w:506,h:365,name:'blue',hit:.30},{x:86,y:665,w:500,h:350,name:'yellow',hit:.30},{x:670,y:665,w:506,h:350,name:'purple',hit:.30}],HUD_BOXES={speed:{x:56,y:48,w:560,h:365},time:{x:634,y:90,w:435,h:165},position:{x:1096,y:88,w:300,h:330},minimap:{x:92,y:446,w:390,h:314},nitro:{x:631,y:451,w:575,h:145},damage:{x:631,y:614,w:575,h:145}},ENV_BOXES={chevron:{x:1096,y:48,w:280,h:140},sign:{x:52,y:236,w:420,h:245}};
const app=document.getElementById('app'),canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),el={loading:document.getElementById('loading'),start:document.getElementById('start'),play:document.getElementById('play'),crashes:document.getElementById('crashes'),avoids:document.getElementById('avoids'),learn:document.getElementById('learn'),policy:document.getElementById('policy'),fill:document.getElementById('fill')};
let W=innerWidth,H=innerHeight,D=1,ready=false,traffic=[],running=false,frame=0,t=0,dist=0,speed=0,lane=0,crashes=0,avoids=0,shake=0,flash=0,sparks=[];const imgs={},sprites={cars:{},hud:{},env:{}},lanes=[-1,0,1];let q=JSON.parse(localStorage.getItem('neon_ai_exact_sprite_q_pro')||'{}');const snd={ctx:null,master:null,engine:null,gain:null,on:false};
function initSound(){try{if(snd.ctx){snd.ctx.resume();snd.on=true;return}const A=window.AudioContext||window.webkitAudioContext;snd.ctx=new A();snd.master=snd.ctx.createGain();snd.master.gain.value=.45;snd.master.connect(snd.ctx.destination);snd.engine=snd.ctx.createOscillator();snd.engine.type='sawtooth';snd.gain=snd.ctx.createGain();snd.gain.gain.value=0;snd.engine.connect(snd.gain);snd.gain.connect(snd.master);snd.engine.start();snd.on=true}catch(e){snd.on=false}}function tone(freq,dur=.12,type='square',vol=.08){if(!snd.ctx||!snd.on)return;const now=snd.ctx.currentTime,o=snd.ctx.createOscillator(),g=snd.ctx.createGain();o.type=type;o.frequency.setValueAtTime(freq,now);g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(.001,now+dur);o.connect(g);g.connect(snd.master);o.start(now);o.stop(now+dur)}function engineAudio(){if(!snd.ctx||!snd.on)return;snd.gain.gain.setTargetAtTime(running?Math.min(.07,.015+speed/5200):0,snd.ctx.currentTime,.06);snd.engine.frequency.setTargetAtTime(58+speed*1.45,snd.ctx.currentTime,.04)}function impactAudio(){tone(90,.35,'triangle',.16);setTimeout(()=>tone(420,.09,'sawtooth',.08),25)}
function loadImage(name,src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>{imgs[name]=i;res(i)};i.onerror=()=>rej(new Error(src));i.src=src+'?v=screenfx2'})}function cropTransparent(img,box,pad=0){const c=document.createElement('canvas');c.width=box.w+pad*2;c.height=box.h+pad*2;const x=c.getContext('2d');x.imageSmoothingEnabled=false;x.drawImage(img,box.x,box.y,box.w,box.h,pad,pad,box.w,box.h);const d=x.getImageData(0,0,c.width,c.height),p=d.data;for(let i=0;i<p.length;i+=4)if(p[i]<32&&p[i+1]<32&&p[i+2]<40)p[i+3]=0;x.putImageData(d,0,0);return trimCanvas(c)}function trimCanvas(s){const x=s.getContext('2d'),d=x.getImageData(0,0,s.width,s.height).data;let minX=s.width,minY=s.height,maxX=0,maxY=0,f=false;for(let y=0;y<s.height;y++)for(let x0=0;x0<s.width;x0++){if(d[(y*s.width+x0)*4+3]>20){f=true;minX=Math.min(minX,x0);minY=Math.min(minY,y);maxX=Math.max(maxX,x0);maxY=Math.max(maxY,y)}}if(!f)return s;const w=maxX-minX+1,h=maxY-minY+1,o=document.createElement('canvas');o.width=w;o.height=h;o.getContext('2d').drawImage(s,minX,minY,w,h,0,0,w,h);return o}function makeStandardSprite(img,w=512,h=384,fill=.86){const o=document.createElement('canvas'),x=o.getContext('2d');o.width=w;o.height=h;x.imageSmoothingEnabled=false;const sc=Math.min((w*fill)/img.width,(h*fill)/img.height),dw=Math.round(img.width*sc),dh=Math.round(img.height*sc);x.drawImage(img,Math.round((w-dw)/2),Math.round((h-dh)/2),dw,dh);return o}function buildSprites(){CAR_BOXES.forEach(b=>sprites.cars[b.name]={img:makeStandardSprite(cropTransparent(imgs.cars,b,12)),hit:b.hit});Object.entries(HUD_BOXES).forEach(([k,b])=>sprites.hud[k]=cropTransparent(imgs.hud,b));Object.entries(ENV_BOXES).forEach(([k,b])=>sprites.env[k]=cropTransparent(imgs.env,b))}
function resize(){const v=window.visualViewport;W=Math.max(320,Math.round(v?.width||innerWidth));H=Math.max(240,Math.round(v?.height||innerHeight));D=Math.min(devicePixelRatio||1,2);app.style.width=W+'px';app.style.height=H+'px';canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=Math.floor(W*D);canvas.height=Math.floor(H*D);ctx.setTransform(D,0,0,D,0,0);ctx.imageSmoothingEnabled=false}
function key(s,a){return s+'|'+a}function getQ(s,a){return q[key(s,a)]??0}function addQ(s,a,v){q[key(s,a)]=getQ(s,a)+v;localStorage.setItem('neon_ai_exact_sprite_q_pro',JSON.stringify(q))}function reset(){if(!ready)return;initSound();tone(520,.16);running=true;frame=0;t=0;dist=0;speed=0;lane=0;traffic=[];sparks=[];crashes=0;avoids=0;shake=0;flash=0;el.start.classList.add('hidden')}
function roadCurve(z){return Math.sin(dist*1.2+z*3)*.5+Math.sin(dist*.7+z*6)*.16}function rp(z){const hz=H*.50;return{x:W/2+roadCurve(z)*W*.16*z,y:hz+Math.pow(z,1.72)*(H-hz+95),w:W*(.08+z*.94)}}function carPos(l,z){const p=rp(z);return{x:p.x+l*p.w*.25,y:p.y,z,w:p.w}}function state(){const near=traffic.filter(c=>c.z>.35&&c.z<.9).sort((a,b)=>b.z-a.z)[0];if(!near)return'clear';const rel=near.lane-lane;if(Math.abs(rel)<.35)return'blocked';return rel<0?'leftcar':'rightcar'}function chooseAction(s){const eps=Math.max(.05,.35-crashes*.025-avoids*.002);if(Math.random()<eps)return[-1,0,1][Math.floor(Math.random()*3)];return[-1,0,1].sort((a,b)=>getQ(s,b)-getQ(s,a))[0]}function ai(){const s=state(),a=chooseAction(s);lane+=a*.055;lane=Math.max(-1.25,Math.min(1.25,lane));el.policy.textContent=a<0?'esquerda':a>0?'direita':'centro'}function spawn(){const names=['blue','yellow','purple'];traffic.push({lane:lanes[Math.floor(Math.random()*3)],z:.04,car:names[Math.floor(Math.random()*names.length)],passed:false})}
function addImpact(x,y,scale){impactAudio();shake=Math.max(shake,18);flash=.65;for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,v=(Math.random()*4+2)*(scale/160);sparks.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-Math.random()*2,life:25+Math.random()*35,max:60,r:(Math.random()*5+3)*(scale/180),c:['#facc15','#fb923c','#ef4444','#f8fafc','#22d3ee'][Math.floor(Math.random()*5)]})}}function updateSparks(){for(const p of sparks){p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.985;p.life--}sparks=sparks.filter(p=>p.life>0);if(shake>0)shake*=.86;if(flash>0)flash*=.86}
function update(){if(!running){updateSparks();engineAudio();return}frame++;t+=1/60;speed=Math.min(315,speed+1.2);dist+=speed/115000;ai();if(frame%58===0)spawn();for(const c of traffic)c.z+=.006+speed/37000;for(const c of traffic){if(!c.passed&&c.z>.86){c.passed=true;avoids++;addQ(state(),0,.02)}}for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.2)traffic.splice(i,1);for(const c of traffic){const hit=(sprites.cars[c.car]?.hit||.3)+sprites.cars.player.hit;if(Math.abs(c.z-.84)<.055&&Math.abs(c.lane-lane)<hit){const p=carPos(lane,.84),sz=Math.min(230,W*.265);addImpact(p.x,H-sz*.5,sz);crashes++;speed*=.45;addQ('blocked',0,-1.2);addQ('blocked',c.lane>=0?-1:1,.8);c.z=1.3}}updateSparks();engineAudio()}
function coverImage(img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),sw=w/r,sh=h/r,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}function drawBackground(){coverImage(imgs.bg,0,0,W,H);ctx.fillStyle='rgba(2,6,23,.16)';ctx.fillRect(0,H*.45,W,H*.55)}function poly(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)ctx.lineTo(p[i][0],p[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}function drawRoad(){const seg=106,scroll=(dist*38)%1,phase=Math.floor(dist*380);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);const p1=rp(z1),p2=rp(z2),alt=(i+phase)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'rgba(8,14,28,.94)':'rgba(31,41,55,.94)');const curb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],curb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],curb);if((i+phase)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb')}}function drawEnv(){const scroll=(dist*13)%1;for(let i=0;i<9;i++){const z=.2+((i*.11+scroll)%.78),p=rp(z),side=i%2?1:-1,w=95*z+38,h=w*.5;ctx.drawImage(sprites.env.chevron,p.x+side*p.w*.57,p.y-h*.8,w,h)}for(let i=0;i<3;i++){const z=.34+((i*.25+scroll*.7)%.52),p=rp(z),w=145*z+72,h=w*.58;ctx.drawImage(sprites.env.sign,p.x+p.w*.34,p.y-h,w,h)}}function drawCarSprite(o,x,y,size){const w=size,h=size*.75;ctx.save();ctx.shadowBlur=14;ctx.shadowColor='rgba(56,189,248,.6)';ctx.drawImage(o.img,x-w/2,y-h/2,w,h);ctx.restore()}function drawCars(){[...traffic].sort((a,b)=>a.z-b.z).forEach(c=>{const p=carPos(c.lane,c.z),s=Math.max(46,c.z*W*.165);drawCarSprite(sprites.cars[c.car],p.x,p.y-s*.05,s)});const p=carPos(lane,.84),s=Math.min(230,W*.265);drawCarSprite(sprites.cars.player,p.x,H-s*.34,s)}function drawSparks(){ctx.save();ctx.globalCompositeOperation='lighter';for(const p of sparks){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()}ctx.restore();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}function drawHudSprites(){const l=14,t=14,r=W-14,m=W<760;ctx.save();ctx.globalAlpha=.96;ctx.drawImage(sprites.hud.position,l,t,m?150:210,m?122:170);ctx.drawImage(sprites.hud.time,W/2-(m?115:170),t,m?230:340,m?75:110);ctx.drawImage(sprites.hud.speed,r-(m?200:320),t,m?200:320,m?153:245);if(!m){ctx.drawImage(sprites.hud.minimap,l,194,170,140);ctx.drawImage(sprites.hud.nitro,r-290,220,260,66);ctx.drawImage(sprites.hud.damage,r-290,294,260,66)}ctx.restore();ctx.fillStyle='white';ctx.textAlign='center';ctx.font='900 '+(m?17:25)+'px monospace';ctx.fillText('BATIDAS '+crashes,m?88:120,m?55:72);ctx.font='900 '+(m?15:22)+'px monospace';ctx.fillText('AI '+Math.floor(speed)+' KM/H',W/2,m?55:62);ctx.textAlign='right';ctx.font='900 '+(m?20:28)+'px monospace';ctx.fillText(Math.floor(speed)+' KM/H',W-(m?28:46),m?82:112);ctx.textAlign='left'}function hud(){el.crashes.textContent=crashes;el.avoids.textContent=avoids;const learn=Math.min(100,Math.floor((avoids/(avoids+crashes+1))*100));el.learn.textContent=learn;el.fill.style.width=learn+'%'}function render(){if(!ready){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);return}ctx.save();if(shake>.5)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);drawBackground();drawRoad();drawEnv();drawCars();drawSparks();ctx.restore();if(flash>.02){ctx.fillStyle='rgba(255,255,255,'+(flash*.35)+')';ctx.fillRect(0,0,W,H)}drawHudSprites();hud()}function loop(){update();render();requestAnimationFrame(loop)}
el.play.onclick=reset;addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,250));window.visualViewport?.addEventListener('resize',resize);document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});resize();Promise.all([loadImage('bg',ASSETS.bg),loadImage('cars',ASSETS.cars),loadImage('hud',ASSETS.hud),loadImage('env',ASSETS.env)]).then(()=>{buildSprites();ready=true;el.loading.classList.add('hidden')}).catch(err=>{el.loading.textContent='Erro ao carregar: '+err.message});loop();</script></body></html>
