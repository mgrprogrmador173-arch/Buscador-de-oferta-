<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Neon Racer AI Curves</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100%;height:100dvh;overflow:hidden;background:#020617;font-family:Arial,Helvetica,sans-serif;color:#fff;overscroll-behavior:none}#app{position:fixed;left:0;top:0;width:100vw;height:100dvh;background:#020617;overflow:hidden}canvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block}.hud{position:absolute;inset:0;z-index:5;pointer-events:none}.aiPanel{position:absolute;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(720px,94vw);padding:10px 12px;text-align:center;background:rgba(2,6,23,.82);border:2px solid #38bdf8;border-radius:12px;box-shadow:0 0 20px rgba(56,189,248,.25);font-size:14px}.bar{height:14px;border:1px solid #334155;background:#020617;margin-top:7px}.fill{height:100%;background:#22c55e;width:0%}.start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.76);text-align:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}.card{width:min(500px,92vw);padding:24px;background:rgba(15,23,42,.95);border:2px solid #38bdf8;border-radius:18px;box-shadow:0 0 36px rgba(56,189,248,.3)}button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;padding:14px 22px;font-size:16px}.loading{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;color:#e0f2fe;background:rgba(2,6,23,.85);border:1px solid #38bdf8;border-radius:12px;padding:12px 18px}.hidden{display:none!important}@media(max-width:760px){.aiPanel{font-size:11px;bottom:max(8px,env(safe-area-inset-bottom));padding:8px 10px}}</style></head><body><div id="app"><canvas id="game"></canvas><div id="loading" class="loading">Carregando sprites PNG...</div><div class="hud"><div class="aiPanel"><b>AI:</b> <span id="mode">APRENDENDO</span> | Batidas: <span id="crashes">0</span> | Desvios: <span id="avoids">0</span> | Curvas certas: <span id="curveOk">0</span> | Curva: <span id="curve">reta</span> | Ação: <span id="policy">centro</span><div class="bar"><div id="fill" class="fill"></div></div></div></div><div class="start" id="start"><div class="card"><h1>Neon Racer AI + Curvas</h1><p>Agora a IA também aprende a reduzir velocidade em curvas para não sair da pista. As placas laterais foram removidas.</p><button id="play">INICIAR TREINO</button></div></div></div><script>
const ASSETS={bg:'assets/neon_lit_cyberpunk_city_by_the_water.png',cars:'assets/retro_pixel_cars_in_neon_grid.png',hud:'assets/neon_pixel_racing_game_hud.png'};
const CAR_BOXES=[{x:88,y:178,w:498,h:365,name:'player',hit:.28},{x:670,y:176,w:506,h:365,name:'blue',hit:.30},{x:86,y:665,w:500,h:350,name:'yellow',hit:.30},{x:670,y:665,w:506,h:350,name:'purple',hit:.30}],HUD_BOXES={speed:{x:56,y:48,w:560,h:365},time:{x:634,y:90,w:435,h:165},position:{x:1096,y:88,w:300,h:330},minimap:{x:92,y:446,w:390,h:314},nitro:{x:631,y:451,w:575,h:145},damage:{x:631,y:614,w:575,h:145}};
const app=document.getElementById('app'),canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),el={loading:document.getElementById('loading'),start:document.getElementById('start'),play:document.getElementById('play'),crashes:document.getElementById('crashes'),avoids:document.getElementById('avoids'),curveOk:document.getElementById('curveOk'),curve:document.getElementById('curve'),policy:document.getElementById('policy'),fill:document.getElementById('fill')};
let W=innerWidth,H=innerHeight,D=1,ready=false,traffic=[],running=false,frame=0,t=0,dist=0,speed=0,lane=0,crashes=0,avoids=0,curveOk=0,shake=0,flash=0,sparks=[],aiBrake=false,lastState='clear',lastAction='center';const imgs={},sprites={cars:{},hud:{}},lanes=[-1,0,1];let q=JSON.parse(localStorage.getItem('neon_ai_curve_q_v1')||'{}');const snd={ctx:null,master:null,engine:null,gain:null,on:false};
function initSound(){try{if(snd.ctx){snd.ctx.resume();snd.on=true;return}const A=window.AudioContext||window.webkitAudioContext;snd.ctx=new A();snd.master=snd.ctx.createGain();snd.master.gain.value=.45;snd.master.connect(snd.ctx.destination);snd.engine=snd.ctx.createOscillator();snd.engine.type='sawtooth';snd.gain=snd.ctx.createGain();snd.gain.gain.value=0;snd.engine.connect(snd.gain);snd.gain.connect(snd.master);snd.engine.start();snd.on=true}catch(e){snd.on=false}}function tone(f,d=.12,type='square',v=.08){if(!snd.ctx||!snd.on)return;const n=snd.ctx.currentTime,o=snd.ctx.createOscillator(),g=snd.ctx.createGain();o.type=type;o.frequency.setValueAtTime(f,n);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g);g.connect(snd.master);o.start(n);o.stop(n+d)}function engineAudio(){if(!snd.ctx||!snd.on)return;snd.gain.gain.setTargetAtTime(running?Math.min(.07,.015+speed/5200):0,snd.ctx.currentTime,.06);snd.engine.frequency.setTargetAtTime(58+speed*1.45,snd.ctx.currentTime,.04)}function impactAudio(){tone(90,.32,'triangle',.16);setTimeout(()=>tone(420,.08,'sawtooth',.08),25)}
function loadImage(n,s){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>{imgs[n]=i;res(i)};i.onerror=()=>rej(new Error(s));i.src=s+'?v=curves1'})}function cropTransparent(img,b,pad=0){const c=document.createElement('canvas');c.width=b.w+pad*2;c.height=b.h+pad*2;const x=c.getContext('2d');x.imageSmoothingEnabled=false;x.drawImage(img,b.x,b.y,b.w,b.h,pad,pad,b.w,b.h);const d=x.getImageData(0,0,c.width,c.height),p=d.data;for(let i=0;i<p.length;i+=4)if(p[i]<32&&p[i+1]<32&&p[i+2]<40)p[i+3]=0;x.putImageData(d,0,0);return trimCanvas(c)}function trimCanvas(s){const x=s.getContext('2d'),d=x.getImageData(0,0,s.width,s.height).data;let minX=s.width,minY=s.height,maxX=0,maxY=0,f=false;for(let y=0;y<s.height;y++)for(let x0=0;x0<s.width;x0++)if(d[(y*s.width+x0)*4+3]>20){f=true;minX=Math.min(minX,x0);minY=Math.min(minY,y);maxX=Math.max(maxX,x0);maxY=Math.max(maxY,y)}if(!f)return s;const w=maxX-minX+1,h=maxY-minY+1,o=document.createElement('canvas');o.width=w;o.height=h;o.getContext('2d').drawImage(s,minX,minY,w,h,0,0,w,h);return o}function makeStandardSprite(img,w=512,h=384,fill=.86){const o=document.createElement('canvas'),x=o.getContext('2d');o.width=w;o.height=h;x.imageSmoothingEnabled=false;const sc=Math.min((w*fill)/img.width,(h*fill)/img.height),dw=Math.round(img.width*sc),dh=Math.round(img.height*sc);x.drawImage(img,Math.round((w-dw)/2),Math.round((h-dh)/2),dw,dh);return o}function buildSprites(){CAR_BOXES.forEach(b=>sprites.cars[b.name]={img:makeStandardSprite(cropTransparent(imgs.cars,b,12)),hit:b.hit});Object.entries(HUD_BOXES).forEach(([k,b])=>sprites.hud[k]=cropTransparent(imgs.hud,b))}
function resize(){const v=window.visualViewport;W=Math.max(320,Math.round(v?.width||innerWidth));H=Math.max(240,Math.round(v?.height||innerHeight));D=Math.min(devicePixelRatio||1,2);app.style.width=W+'px';app.style.height=H+'px';canvas.width=Math.floor(W*D);canvas.height=Math.floor(H*D);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0);ctx.imageSmoothingEnabled=false}
function key(s,a){return s+'|'+a}function getQ(s,a){return q[key(s,a)]??0}function addQ(s,a,v){q[key(s,a)]=getQ(s,a)+v;localStorage.setItem('neon_ai_curve_q_v1',JSON.stringify(q))}function reset(){if(!ready)return;initSound();tone(520,.16);running=true;frame=0;t=0;dist=0;speed=0;lane=0;traffic=[];sparks=[];crashes=0;avoids=0;curveOk=0;shake=0;flash=0;el.start.classList.add('hidden')}
function roadCurve(z){return Math.sin(dist*.95+z*4.1)*.78+Math.sin(dist*.43+z*8.8)*.26}function curveInfo(){const c=roadCurve(.82),sev=Math.min(1,Math.abs(c));return{value:c,severity:sev,dir:c>=0?1:-1,safe:Math.max(135,292-sev*145)}}function rp(z){const hz=H*.50;return{x:W/2+roadCurve(z)*W*.18*z,y:hz+Math.pow(z,1.72)*(H-hz+95),w:W*(.08+z*.94)}}function carPos(l,z){const p=rp(z);return{x:p.x+l*p.w*.25,y:p.y,z,w:p.w}}
function state(){const c=curveInfo();let s=c.severity>.62?'curveHard':c.severity>.38?'curveMid':'straight';s+=c.dir>0?'R':'L';const near=traffic.filter(o=>o.z>.35&&o.z<.9).sort((a,b)=>b.z-a.z)[0];if(near&&Math.abs(near.lane-lane)<.35)s+='Blocked';return s}function chooseAction(s){const c=curveInfo(),actions=['left','center','right','brake'];let eps=Math.max(.04,.32-crashes*.018-avoids*.0015-curveOk*.002);if(Math.random()<eps)return actions[Math.floor(Math.random()*actions.length)];let best=actions.slice().sort((a,b)=>getQ(s,b)-getQ(s,a))[0];if(getQ(s,best)===0&&c.severity>.42&&speed>c.safe)return 'brake';return best}function ai(){const s=state(),a=chooseAction(s);lastState=s;lastAction=a;aiBrake=a==='brake';if(a==='left')lane-=.052;if(a==='right')lane+=.052;if(a==='center'){lane*=.985}lane=Math.max(-1.35,Math.min(1.35,lane));el.policy.textContent=aiBrake?'frear':a}
function spawn(){const names=['blue','yellow','purple'];traffic.push({lane:lanes[Math.floor(Math.random()*3)],z:.04,car:names[Math.floor(Math.random()*names.length)],passed:false})}function addImpact(x,y,scale){impactAudio();shake=Math.max(shake,18);flash=.65;for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,v=(Math.random()*4+2)*(scale/160);sparks.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-Math.random()*2,life:25+Math.random()*35,max:60,r:(Math.random()*5+3)*(scale/180),c:['#facc15','#fb923c','#ef4444','#f8fafc','#22d3ee'][Math.floor(Math.random()*5)]})}}function updateSparks(){for(const p of sparks){p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.985;p.life--}sparks=sparks.filter(p=>p.life>0);if(shake>0)shake*=.86;if(flash>0)flash*=.86}
function crashPenalty(type){const p=carPos(lane,.84),sz=Math.min(230,W*.265);addImpact(p.x,H-sz*.5,sz);crashes++;speed*=.45;addQ(lastState,lastAction,-1.25);if(type==='curve'){addQ(lastState,'brake',1.05);addQ(lastState,curveInfo().dir>0?'left':'right',.38)}else{addQ('blocked','center',-1.2)}}function update(){if(!running){updateSparks();engineAudio();return}frame++;t+=1/60;const c=curveInfo();speed=Math.max(40,Math.min(315,speed+(aiBrake?-4.2:1.2)));dist+=speed/115000;ai();if(c.severity>.38&&speed>c.safe){lane+=c.dir*((speed-c.safe)/190)*.035}if(Math.abs(lane)>1.24){crashPenalty('curve');lane=Math.max(-1.05,Math.min(1.05,lane))}if(frame%30===0&&c.severity>.38&&speed<c.safe+18&&Math.abs(lane)<1.05){curveOk++;addQ(lastState,'brake',.035);addQ(lastState,'center',.01)}if(frame%58===0)spawn();for(const o of traffic)o.z+=.006+speed/37000;for(const o of traffic){if(!o.passed&&o.z>.86){o.passed=true;avoids++;addQ(state(),'center',.02)}}for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.2)traffic.splice(i,1);for(const o of traffic){const hit=(sprites.cars[o.car]?.hit||.3)+sprites.cars.player.hit;if(Math.abs(o.z-.84)<.055&&Math.abs(o.lane-lane)<hit){crashPenalty('car');addQ('blocked',o.lane>=0?'left':'right',.8);o.z=1.3}}updateSparks();engineAudio()}
function coverImage(img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),sw=w/r,sh=h/r,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}function drawBackground(){coverImage(imgs.bg,0,0,W,H);ctx.fillStyle='rgba(2,6,23,.16)';ctx.fillRect(0,H*.45,W,H*.55)}function poly(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)ctx.lineTo(p[i][0],p[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}function drawRoad(){const seg=116,scroll=(dist*40)%1,phase=Math.floor(dist*410);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);const p1=rp(z1),p2=rp(z2),alt=(i+phase)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'rgba(8,14,28,.94)':'rgba(31,41,55,.94)');const curb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],curb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],curb);if((i+phase)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb');if((i+phase)%10===0){ctx.globalAlpha=.2;ctx.strokeStyle='#38bdf8';ctx.lineWidth=Math.max(1,z1*3);ctx.beginPath();ctx.moveTo(p1.x-p1.w*.28,p1.y);ctx.lineTo(p2.x-p2.w*.22,p2.y);ctx.stroke();ctx.globalAlpha=1}}}
function drawCarSprite(o,x,y,size){const w=size,h=size*.75;ctx.save();ctx.shadowBlur=14;ctx.shadowColor='rgba(56,189,248,.6)';ctx.drawImage(o.img,x-w/2,y-h/2,w,h);ctx.restore()}function drawCars(){[...traffic].sort((a,b)=>a.z-b.z).forEach(o=>{const p=carPos(o.lane,o.z),s=Math.max(46,o.z*W*.165);drawCarSprite(sprites.cars[o.car],p.x,p.y-s*.05,s)});const p=carPos(lane,.84),s=Math.min(230,W*.265);drawCarSprite(sprites.cars.player,p.x,H-s*.34,s)}function drawSparks(){ctx.save();ctx.globalCompositeOperation='lighter';for(const p of sparks){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()}ctx.restore();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}function drawHudSprites(){const l=14,t=14,r=W-14,m=W<760;ctx.save();ctx.globalAlpha=.96;ctx.drawImage(sprites.hud.position,l,t,m?150:210,m?122:170);ctx.drawImage(sprites.hud.time,W/2-(m?115:170),t,m?230:340,m?75:110);ctx.drawImage(sprites.hud.speed,r-(m?200:320),t,m?200:320,m?153:245);if(!m){ctx.drawImage(sprites.hud.minimap,l,194,170,140);ctx.drawImage(sprites.hud.nitro,r-290,220,260,66);ctx.drawImage(sprites.hud.damage,r-290,294,260,66)}ctx.restore();ctx.fillStyle='white';ctx.textAlign='center';ctx.font='900 '+(m?16:23)+'px monospace';ctx.fillText('BATIDAS '+crashes,m?88:120,m?55:72);ctx.font='900 '+(m?14:20)+'px monospace';ctx.fillText('AI '+Math.floor(speed)+' KM/H',W/2,m?55:62);ctx.textAlign='right';ctx.font='900 '+(m?19:27)+'px monospace';ctx.fillText(Math.floor(speed)+' KM/H',W-(m?28:46),m?82:112);ctx.textAlign='left'}function hud(){el.crashes.textContent=crashes;el.avoids.textContent=avoids;el.curveOk.textContent=curveOk;const c=curveInfo();el.curve.textContent=c.severity>.62?(c.dir>0?'forte direita':'forte esquerda'):c.severity>.38?(c.dir>0?'direita':'esquerda'):'reta';const learn=Math.min(100,Math.floor(((avoids+curveOk)/(avoids+curveOk+crashes+1))*100));el.fill.style.width=learn+'%'}function render(){if(!ready){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);return}ctx.save();if(shake>.5)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);drawBackground();drawRoad();drawCars();drawSparks();ctx.restore();if(flash>.02){ctx.fillStyle='rgba(255,255,255,'+(flash*.35)+')';ctx.fillRect(0,0,W,H)}drawHudSprites();hud()}function loop(){update();render();requestAnimationFrame(loop)}
el.play.onclick=reset;addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,250));window.visualViewport?.addEventListener('resize',resize);document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});resize();Promise.all([loadImage('bg',ASSETS.bg),loadImage('cars',ASSETS.cars),loadImage('hud',ASSETS.hud)]).then(()=>{buildSprites();ready=true;el.loading.classList.add('hidden')}).catch(err=>{el.loading.textContent='Erro ao carregar: '+err.message});loop();</script></body></html>
