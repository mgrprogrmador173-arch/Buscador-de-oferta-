<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Neon Racer AI 3D</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100dvh;overflow:hidden;background:#020617;font-family:Arial,Helvetica,sans-serif;color:#fff}#app{position:fixed;inset:0;background:#020617;overflow:hidden}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.panel{position:absolute;left:50%;bottom:max(12px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:5;width:min(780px,94vw);padding:10px 12px;text-align:center;background:rgba(2,6,23,.84);border:2px solid #38bdf8;border-radius:12px;box-shadow:0 0 22px rgba(56,189,248,.3);font-size:13px}.bar{height:13px;border:1px solid #334155;background:#020617;margin-top:6px}.fill{height:100%;background:#22c55e;width:0%}.learnBtn{position:absolute;right:14px;bottom:calc(max(12px,env(safe-area-inset-bottom)) + 78px);z-index:8;border:2px solid #facc15;border-radius:16px;background:linear-gradient(135deg,#facc15,#fb923c);color:#1f1300;font-weight:900;padding:12px 14px;font-size:13px;box-shadow:0 0 24px rgba(250,204,21,.4);pointer-events:auto}.learnBtn.on{background:linear-gradient(135deg,#22c55e,#38bdf8);border-color:#86efac}.start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.78);text-align:center}.card{width:min(510px,92vw);padding:24px;background:rgba(15,23,42,.96);border:2px solid #38bdf8;border-radius:18px;box-shadow:0 0 36px rgba(56,189,248,.35)}button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#22d3ee);color:#082f49;font-weight:900;padding:14px 22px;font-size:16px}.loading{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;color:#e0f2fe;background:rgba(2,6,23,.88);border:1px solid #38bdf8;border-radius:12px;padding:12px 18px}.hidden{display:none!important}@media(max-width:760px){.panel{font-size:10px;padding:8px}.learnBtn{right:8px;bottom:calc(max(8px,env(safe-area-inset-bottom)) + 86px);font-size:11px;padding:10px}}</style></head><body><div id="app"><canvas id="game"></canvas><div id="loading" class="loading">Carregando sprites 3D...</div><button id="learnBoost" class="learnBtn">APRENDER +</button><div class="panel"><b>AI 3D</b> | Batidas: <span id="crashes">0</span> | Desvios: <span id="avoids">0</span> | Curvas certas: <span id="curveOk">0</span> | Curva: <span id="curve">reta</span> | Ação: <span id="policy">centro</span> | Aprendizado: <span id="learnLevel">1x</span> | <span id="kmh">0</span> km/h<div class="bar"><div id="fill" class="fill"></div></div></div><div class="start" id="start"><div class="card"><h1>Neon Racer AI 3D</h1><p>A IA agora aprende mais rápido a fazer curvas e desviar dos veículos.</p><button id="play">INICIAR TREINO</button></div></div></div><script>
const ASSETS={bg:'assets/neon_lit_cyberpunk_city_by_the_water.png',cars:'assets/sports_car_showcase_in_neon_colors.png',road:'assets/neon_sci_fi_road_and_track_assets.png'};
const CAR_BOXES=[{x:105,y:80,w:520,h:420,n:'player',hit:.27},{x:780,y:80,w:520,h:420,n:'blue',hit:.29},{x:105,y:570,w:520,h:410,n:'yellow',hit:.29},{x:780,y:570,w:520,h:410,n:'purple',hit:.29}];
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),app=document.getElementById('app');
const el={start:document.getElementById('start'),play:document.getElementById('play'),loading:document.getElementById('loading'),crashes:document.getElementById('crashes'),avoids:document.getElementById('avoids'),curveOk:document.getElementById('curveOk'),curve:document.getElementById('curve'),policy:document.getElementById('policy'),fill:document.getElementById('fill'),kmh:document.getElementById('kmh'),learnBoost:document.getElementById('learnBoost'),learnLevel:document.getElementById('learnLevel')};
let W=innerWidth,H=innerHeight,D=1,ready=false,running=false,frame=0,dist=0,speed=0,lane=0,crashes=0,avoids=0,curveOk=0,aiBrake=false,lastState='clear',lastAction='center',shake=0,flash=0,learnBoost=Number(localStorage.getItem('neon_ai_learn_boost')||2);const imgs={},sprites={cars:{},road:null},traffic=[],sparks=[],lanes=[-1,0,1];let q=JSON.parse(localStorage.getItem('neon_ai_3d_q_v2')||'{}');
const snd={ctx:null,master:null,engine:null,gain:null,on:false};function sound(){try{if(snd.ctx){snd.ctx.resume();snd.on=true;return}const A=window.AudioContext||window.webkitAudioContext;snd.ctx=new A();snd.master=snd.ctx.createGain();snd.master.gain.value=.42;snd.master.connect(snd.ctx.destination);snd.engine=snd.ctx.createOscillator();snd.engine.type='sawtooth';snd.gain=snd.ctx.createGain();snd.gain.gain.value=0;snd.engine.connect(snd.gain);snd.gain.connect(snd.master);snd.engine.start();snd.on=true}catch(e){snd.on=false}}function tone(f,d=.12,t='square',v=.08){if(!snd.ctx||!snd.on)return;const n=snd.ctx.currentTime,o=snd.ctx.createOscillator(),g=snd.ctx.createGain();o.type=t;o.frequency.setValueAtTime(f,n);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g);g.connect(snd.master);o.start(n);o.stop(n+d)}function audio(){if(!snd.ctx||!snd.on)return;snd.gain.gain.setTargetAtTime(running?Math.min(.07,.015+speed/5200):0,snd.ctx.currentTime,.06);snd.engine.frequency.setTargetAtTime(58+speed*1.45,snd.ctx.currentTime,.04)}
function boostValue(v){return Number(v)*learnBoost*1.45}function updateLearnButton(){el.learnLevel.textContent=learnBoost+'x';el.learnBoost.textContent='APRENDER '+learnBoost+'x';el.learnBoost.classList.toggle('on',learnBoost>1)}function cycleBoost(){learnBoost=learnBoost===2?4:learnBoost===4?8:learnBoost===8?12:2;localStorage.setItem('neon_ai_learn_boost',String(learnBoost));updateLearnButton();tone(620,.09,'square',.07)}
function load(n,s){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>{imgs[n]=i;res()};i.onerror=()=>rej(new Error(s));i.src=s+'?v=fastai1'})}function crop(img,b,clean=true){const c=document.createElement('canvas');c.width=b.w;c.height=b.h;const x=c.getContext('2d');x.imageSmoothingEnabled=false;x.drawImage(img,b.x,b.y,b.w,b.h,0,0,b.w,b.h);if(clean){const d=x.getImageData(0,0,c.width,c.height),p=d.data;for(let i=0;i<p.length;i+=4){if(p[i]<30&&p[i+1]<30&&p[i+2]<36)p[i+3]=0}x.putImageData(d,0,0)}return trim(c)}function trim(s){const x=s.getContext('2d'),d=x.getImageData(0,0,s.width,s.height).data;let a=s.width,b=s.height,c=0,e=0,f=false;for(let y=0;y<s.height;y++)for(let xx=0;xx<s.width;xx++)if(d[(y*s.width+xx)*4+3]>20){f=true;a=Math.min(a,xx);b=Math.min(b,y);c=Math.max(c,xx);e=Math.max(e,y)}if(!f)return s;const o=document.createElement('canvas'),w=c-a+1,h=e-b+1;o.width=w;o.height=h;o.getContext('2d').drawImage(s,a,b,w,h,0,0,w,h);return o}function std(img,w=512,h=384){const o=document.createElement('canvas'),x=o.getContext('2d');o.width=w;o.height=h;x.imageSmoothingEnabled=false;const s=Math.min(w*.92/img.width,h*.88/img.height),dw=img.width*s,dh=img.height*s;x.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);return o}function build(){CAR_BOXES.forEach(b=>sprites.cars[b.n]={img:std(crop(imgs.cars,b,true)),hit:b.hit});sprites.road=crop(imgs.road,{x:45,y:45,w:435,h:310},false)}
function resize(){const v=visualViewport;W=Math.max(320,Math.round(v?.width||innerWidth));H=Math.max(240,Math.round(v?.height||innerHeight));D=Math.min(devicePixelRatio||1,2);app.style.width=W+'px';app.style.height=H+'px';canvas.width=W*D;canvas.height=H*D;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0);ctx.imageSmoothingEnabled=false}
function key(s,a){return s+'|'+a}function getQ(s,a){return q[key(s,a)]??0}function addQ(s,a,v){q[key(s,a)]=getQ(s,a)+boostValue(v);localStorage.setItem('neon_ai_3d_q_v2',JSON.stringify(q))}function reset(){if(!ready)return;sound();tone(520,.16);running=true;frame=0;dist=0;speed=0;lane=0;traffic.length=0;sparks.length=0;crashes=0;avoids=0;curveOk=0;shake=0;flash=0;el.start.classList.add('hidden')}
function roadCurve(z){return Math.sin(dist*.95+z*4.1)*.78+Math.sin(dist*.43+z*8.8)*.26}function curveInfo(){const c=roadCurve(.82),sev=Math.min(1,Math.abs(c));return{v:c,severity:sev,dir:c>=0?1:-1,safe:Math.max(135,292-sev*145)}}function rp(z){const hz=H*.5;return{x:W/2+roadCurve(z)*W*.18*z,y:hz+Math.pow(z,1.72)*(H-hz+95),w:W*(.08+z*.94)}}function carPos(l,z){const p=rp(z);return{x:p.x+l*p.w*.25,y:p.y,z,w:p.w}}
function nearestCar(){return traffic.filter(o=>o.z>.18&&o.z<.96).sort((a,b)=>b.z-a.z)[0]||null}function laneFree(target){return !traffic.some(o=>o.z>.34&&o.z<.98&&Math.abs(o.lane-target)<.36)}function avoidHint(car){if(!car)return null;let opts=[-1,0,1].filter(l=>laneFree(l));if(opts.length===0)return 'brake';opts.sort((a,b)=>Math.abs(a-lane)-Math.abs(b-lane));let best=opts[0];return best<lane?'left':best>lane?'right':'center'}
function state(){const c=curveInfo();let s=c.severity>.62?'curveHard':c.severity>.38?'curveMid':'straight';s+=c.dir>0?'R':'L';const n=nearestCar();if(n){const gap=n.z.toFixed(1);if(Math.abs(n.lane-lane)<.42)s+='Block'+gap;else if(n.lane<lane)s+='CarL'+gap;else s+='CarR'+gap}return s}function choose(s){const c=curveInfo(),n=nearestCar(),acts=['left','center','right','brake'];let eps=Math.max(.01,.22-crashes*.015-avoids*.002-curveOk*.002-(learnBoost-2)*.025);if(n&&n.z>.42&&n.z<.92&&Math.abs(n.lane-lane)<.46){let h=avoidHint(n);if(h&&Math.random()>.06)return h}if(Math.random()<eps)return acts[Math.floor(Math.random()*acts.length)];let best=acts.slice().sort((a,b)=>getQ(s,b)-getQ(s,a))[0];if(getQ(s,best)===0&&c.severity>.42&&speed>c.safe)return'brake';return best}function ai(){const s=state(),a=choose(s);lastState=s;lastAction=a;aiBrake=a==='brake';if(a==='left')lane-=.065;if(a==='right')lane+=.065;if(a==='center')lane*=.985;lane=Math.max(-1.35,Math.min(1.35,lane));el.policy.textContent=aiBrake?'frear':a}
function spawn(){const n=['blue','yellow','purple'];traffic.push({lane:lanes[Math.floor(Math.random()*3)],z:.04,car:n[Math.floor(Math.random()*3)],passed:false,learned:false})}function impact(x,y,s){tone(90,.32,'triangle',.16);setTimeout(()=>tone(420,.08,'sawtooth',.08),25);shake=18;flash=.65;for(let i=0;i<60;i++){const a=Math.random()*6.283,v=(Math.random()*4+2)*(s/160);sparks.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-Math.random()*2,life:25+Math.random()*35,max:60,r:(Math.random()*5+3)*(s/180),c:['#facc15','#fb923c','#ef4444','#f8fafc','#22d3ee'][Math.floor(Math.random()*5)]})}}function crash(type,o){const p=carPos(lane,.84),s=Math.min(250,W*.285);impact(p.x,H-s*.5,s);crashes++;speed*=.45;addQ(lastState,lastAction,-1.9);if(type==='curve'){addQ(lastState,'brake',1.55);addQ(lastState,curveInfo().dir>0?'left':'right',.55)}else{addQ(lastState,'center',-1.85);addQ(lastState,'brake',.75);if(o){addQ(lastState,o.lane>=lane?'left':'right',1.8);let h=avoidHint(o);if(h)addQ(lastState,h,2.1)}}}
function update(){if(!running){effects();audio();return}frame++;const c=curveInfo();speed=Math.max(40,Math.min(315,speed+(aiBrake?-4.2:1.2)));dist+=speed/115000;ai();if(c.severity>.38&&speed>c.safe)lane+=c.dir*((speed-c.safe)/190)*.035;if(Math.abs(lane)>1.24){crash('curve');lane=Math.max(-1.05,Math.min(1.05,lane))}if(frame%24===0&&c.severity>.38&&speed<c.safe+22&&Math.abs(lane)<1.05){curveOk++;addQ(lastState,'brake',.065);addQ(lastState,'center',.025)}if(frame%58===0)spawn();for(const o of traffic)o.z+=.006+speed/37000;for(const o of traffic){if(!o.learned&&o.z>.62&&o.z<.94&&Math.abs(o.lane-lane)>.42){o.learned=true;avoids++;addQ(lastState,lastAction,.95);addQ(lastState,'center',.12)}if(!o.passed&&o.z>.96){o.passed=true;addQ(state(),'center',.06)}}for(let i=traffic.length-1;i>=0;i--)if(traffic[i].z>1.2)traffic.splice(i,1);for(const o of traffic){const hit=(sprites.cars[o.car].hit+sprites.cars.player.hit);if(Math.abs(o.z-.84)<.055&&Math.abs(o.lane-lane)<hit){crash('car',o);o.z=1.3}}effects();audio()}function effects(){for(const p of sparks){p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.985;p.life--}for(let i=sparks.length-1;i>=0;i--)if(sparks[i].life<=0)sparks.splice(i,1);shake*=.86;flash*=.86}
function cover(img,x,y,w,h){const r=Math.max(w/img.width,h/img.height),sw=w/r,sh=h/r,sx=(img.width-sw)/2,sy=(img.height-sh)/2;ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}function drawBg(){cover(imgs.bg,0,0,W,H);ctx.fillStyle='rgba(2,6,23,.16)';ctx.fillRect(0,H*.45,W,H*.55)}function poly(p,c){ctx.beginPath();ctx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)ctx.lineTo(p[i][0],p[i][1]);ctx.closePath();ctx.fillStyle=c;ctx.fill()}function drawRoad(){const seg=116,scroll=(dist*40)%1,phase=Math.floor(dist*410);for(let i=-2;i<seg;i++){let z1=(i+scroll)/seg,z2=(i+1+scroll)/seg;if(z2<=0||z1>=1.05)continue;z1=Math.max(0,z1);z2=Math.min(1,z2);const p1=rp(z1),p2=rp(z2),alt=(i+phase)%2;poly([[p1.x-p1.w/2,p1.y],[p1.x+p1.w/2,p1.y],[p2.x+p2.w/2,p2.y],[p2.x-p2.w/2,p2.y]],alt?'rgba(8,14,28,.94)':'rgba(31,41,55,.94)');ctx.globalAlpha=.32;ctx.drawImage(sprites.road,0,(phase+i*3)%sprites.road.height,sprites.road.width,3,p1.x-p1.w/2,p1.y,p1.w,Math.max(2,p2.y-p1.y));ctx.globalAlpha=1;const curb=alt?'#ef4444':'#f8fafc';poly([[p1.x-p1.w/2-6,p1.y],[p1.x-p1.w/2+14,p1.y],[p2.x-p2.w/2+28,p2.y],[p2.x-p2.w/2-18,p2.y]],curb);poly([[p1.x+p1.w/2-14,p1.y],[p1.x+p1.w/2+6,p1.y],[p2.x+p2.w/2+18,p2.y],[p2.x+p2.w/2-28,p2.y]],curb);if((i+phase)%6===0)poly([[p1.x-5,p1.y],[p1.x+5,p1.y],[p2.x+12,p2.y],[p2.x-12,p2.y]],'#e5e7eb')}}function drawCar(o,x,y,s){const w=s,h=s*.75;ctx.save();ctx.shadowBlur=16;ctx.shadowColor='rgba(56,189,248,.65)';ctx.drawImage(o.img,x-w/2,y-h/2,w,h);ctx.restore()}function drawCars(){[...traffic].sort((a,b)=>a.z-b.z).forEach(o=>{const p=carPos(o.lane,o.z),s=Math.max(52,o.z*W*.19);drawCar(sprites.cars[o.car],p.x,p.y-s*.05,s)});const p=carPos(lane,.84),s=Math.min(260,W*.30);drawCar(sprites.cars.player,p.x,H-s*.34,s)}function drawSparks(){ctx.save();ctx.globalCompositeOperation='lighter';for(const p of sparks){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.283);ctx.fill()}ctx.restore();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}function hud(){el.crashes.textContent=crashes;el.avoids.textContent=avoids;el.curveOk.textContent=curveOk;el.kmh.textContent=Math.floor(speed);const c=curveInfo();el.curve.textContent=c.severity>.62?(c.dir>0?'forte direita':'forte esquerda'):c.severity>.38?(c.dir>0?'direita':'esquerda'):'reta';el.fill.style.width=Math.min(100,Math.floor(((avoids+curveOk)/(avoids+curveOk+crashes+1))*100))+'%'}function render(){if(!ready){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);return}ctx.save();if(shake>.5)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);drawBg();drawRoad();drawCars();drawSparks();ctx.restore();if(flash>.02){ctx.fillStyle='rgba(255,255,255,'+(flash*.35)+')';ctx.fillRect(0,0,W,H)}hud()}function loop(){update();render();requestAnimationFrame(loop)}
el.play.onclick=reset;el.learnBoost.onclick=cycleBoost;updateLearnButton();addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,250));window.visualViewport?.addEventListener('resize',resize);document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});resize();Promise.all([load('bg',ASSETS.bg),load('cars',ASSETS.cars),load('road',ASSETS.road)]).then(()=>{build();ready=true;el.loading.classList.add('hidden')}).catch(e=>{el.loading.textContent='Erro ao carregar '+e.message});loop();
</script></body></html>
